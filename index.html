<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legend - Recovered Build v0.3</title>
  <style>
    :root{--bg:#060807;--soft:#0d1813;--panel:rgba(10,18,15,.94);--panel2:rgba(5,10,8,.58);--border:rgba(132,255,178,.24);--border2:rgba(255,211,105,.30);--text:#eaffef;--muted:#93b7a3;--accent:#7dffad;--gold:#ffd369;--red:#ff6b6b;--blue:#8dd7ff;--purple:#c08cff;--shadow:rgba(0,0,0,.42)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--text);font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(125,255,173,.12),transparent 28%),radial-gradient(circle at 85% 20%,rgba(255,211,105,.08),transparent 24%),radial-gradient(circle at 50% 100%,rgba(80,144,255,.07),transparent 38%),linear-gradient(180deg,var(--soft),var(--bg));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(circle at center,black,transparent 78%)}body:after{content:"";pointer-events:none;position:fixed;inset:0;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.026),rgba(255,255,255,.026) 1px,transparent 2px,transparent 5px);opacity:.12;mix-blend-mode:screen}
    button,input{font:inherit}.shell{width:min(1440px,96vw);margin:22px auto;min-height:calc(100vh - 44px);display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}.panel,.topbar,.title-card{border:1px solid var(--border);background:linear-gradient(180deg,rgba(16,30,24,.96),rgba(6,10,9,.94));box-shadow:0 18px 50px var(--shadow),inset 0 0 35px rgba(125,255,173,.035);border-radius:18px;backdrop-filter:blur(8px)}.topbar{min-height:86px;padding:16px 20px;display:grid;grid-template-columns:1.25fr 1fr 1fr;gap:14px;align-items:center}.brand h1{margin:0;color:var(--accent);font-size:clamp(2rem,5vw,4.8rem);line-height:.88;letter-spacing:.18em;text-shadow:0 0 18px rgba(125,255,173,.35)}.brand .sub{margin-top:8px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;font-size:.8rem}.meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.box,.stat,.card,.quest,.shop,.skill,.event-card{background:var(--panel2);border:1px solid rgba(132,255,178,.14);border-radius:14px;padding:12px}.label{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:.72rem;margin-bottom:5px}.value{color:var(--gold);font-weight:800}.green{color:var(--accent)}.gold{color:var(--gold)}.red{color:var(--red)}.blue{color:var(--blue)}.purple{color:var(--purple)}.muted{color:var(--muted)}
    .title-wrap{min-height:calc(100vh - 44px);display:grid;place-items:center;padding:18px}.title-card{width:min(990px,100%);padding:clamp(24px,5vw,56px);position:relative;overflow:hidden}.title-card:before{content:"";position:absolute;inset:-40%;background:conic-gradient(from 30deg,transparent,rgba(125,255,173,.08),transparent,rgba(255,211,105,.07),transparent);animation:spin 18s linear infinite;opacity:.6}@keyframes spin{to{transform:rotate(360deg)}}.title-content{position:relative;z-index:1}.kicker{color:var(--gold);text-transform:uppercase;letter-spacing:.25em;margin:18px 0 8px}.game-title{margin:0;color:var(--accent);font-size:clamp(3.2rem,13vw,9.5rem);letter-spacing:.18em;line-height:.85;text-shadow:0 0 24px rgba(125,255,173,.42),0 6px 0 rgba(0,0,0,.35)}.title-lore{max-width:760px;color:#d7efe0;font-size:1.05rem;line-height:1.7;margin:18px 0 26px}.actions,.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.btn{border:1px solid rgba(132,255,178,.28);background:linear-gradient(180deg,rgba(31,54,44,.96),rgba(10,18,15,.96));color:var(--text);min-height:46px;border-radius:12px;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:.16s ease}.btn:hover,.card:hover,.shop:hover,.skill:hover,.event-card:hover{transform:translateY(-2px);border-color:rgba(255,211,105,.55);box-shadow:0 0 22px rgba(255,211,105,.11),0 14px 24px rgba(0,0,0,.2)}.btn.primary{border-color:rgba(255,211,105,.46);color:#231a04;background:linear-gradient(180deg,#ffe29a,#d69f32);font-weight:900}.btn.danger{border-color:rgba(255,107,107,.5);color:var(--red);background:rgba(45,9,9,.6)}input{background:rgba(0,0,0,.5);color:var(--text);border:1px solid rgba(132,255,178,.28);border-radius:12px;padding:13px 14px;min-width:min(330px,100%);outline:none}input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,211,105,.08)}
    .layout{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(340px,.8fr);gap:14px;flex:1}.panel{padding:16px}.panel-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(132,255,178,.13)}.panel-head h2,.panel-head h3{margin:0;color:var(--accent);letter-spacing:.04em}.panel-head p{margin:4px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.stack{display:flex;flex-direction:column;gap:14px}.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat .num{color:var(--text);font-size:1.02rem;font-weight:800}.bar{height:9px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:8px;border:1px solid rgba(255,255,255,.07)}.bar>span{display:block;height:100%;width:50%;background:linear-gradient(90deg,#46c77a,#7dffad);border-radius:inherit}.bar.red>span{background:linear-gradient(90deg,#b52424,#ff6b6b)}.bar.gold>span{background:linear-gradient(90deg,#a96b12,#ffd369)}.log{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow:auto;padding-right:4px}.log-entry{background:rgba(255,255,255,.035);border-left:3px solid rgba(125,255,173,.44);border-radius:10px;padding:10px 12px;color:#d9f1e2;line-height:1.35}.log-entry.story{border-left-color:var(--gold);color:#fff0c2}.log-entry.danger{border-left-color:var(--red);color:#ffd3d3}.text{color:#e7f5ec;line-height:1.65;font-size:1.02rem;white-space:pre-wrap}.ascii{font-family:Consolas,"Courier New",monospace;color:var(--accent);background:rgba(0,0,0,.25);border:1px solid rgba(125,255,173,.18);border-radius:14px;padding:14px;margin-bottom:14px;overflow:auto;line-height:1.15;text-shadow:0 0 10px rgba(125,255,173,.22)}.list{display:grid;gap:10px}.card,.shop,.skill,.event-card{width:100%;text-align:left;color:var(--text);cursor:pointer;transition:.16s ease}.card h3,.shop h3,.skill h3,.event-card h3,.quest h3{margin:0 0 6px;color:var(--gold)}.card p,.shop p,.skill p,.event-card p,.quest p{margin:0;color:var(--muted);line-height:1.4}.battle{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.enemy{min-height:360px;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at center,rgba(255,107,107,.11),transparent 40%),rgba(0,0,0,.24);border:1px solid rgba(255,107,107,.22);border-radius:18px;padding:18px;position:relative;overflow:hidden}.enemy:before{content:"";position:absolute;width:240px;height:240px;border:1px solid rgba(255,107,107,.18);border-radius:50%;box-shadow:0 0 40px rgba(255,107,107,.08);animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(.96);opacity:.65}50%{transform:scale(1.08);opacity:1}}.glyph{font-size:clamp(4rem,10vw,8rem);filter:drop-shadow(0 0 18px rgba(255,107,107,.38));position:relative;z-index:1}.small{color:var(--muted);font-size:.9rem;line-height:1.45}.choice-row{display:grid;gap:10px;margin-top:14px}.danger-meter{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:8px}.pip{height:10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}.pip.on{background:linear-gradient(90deg,#a96b12,#ffd369)}.pip.bad{background:linear-gradient(90deg,#b52424,#ff6b6b)}
    @media(max-width:1100px){.topbar,.layout,.battle{grid-template-columns:1fr}.meta-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:720px){.shell{width:min(100vw - 16px,1440px);margin:8px auto}.grid,.stat-grid,.meta-grid{grid-template-columns:1fr}.brand h1,.game-title{letter-spacing:.10em}.panel-head{align-items:start;flex-direction:column}.actions{flex-direction:column;align-items:stretch}.btn{width:100%}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const SAVE_KEY="legend-recovered-build-v03";
    const oldKey="legend-recovered-build-v02";
    const root=document.getElementById("root");
    const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const esc=s=>String(s).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));

    const classes={Adventurer:{hp:105,gold:120,mod:{survival:1,luck:1},desc:"Balanced survivor. Good for a first run."},Warrior:{hp:135,gold:90,mod:{strength:3},desc:"High HP and better force checks."},Ranger:{hp:112,gold:100,mod:{survival:3,agility:1},desc:"Better road sense, scouting, and fleeing."},Mage:{hp:85,gold:130,mod:{magic:3,lore:1},desc:"Runic power and better strange-event checks."},Thief:{hp:95,gold:160,mod:{thieving:3,agility:1},desc:"Better stealing, locks, and risky rewards."},Skiller:{hp:92,gold:125,mod:{craft:2,survival:1},desc:"Better gathering, crafting, and non-combat play."}};
    const origins={"Lost Squire":{bonus:{strength:1},text:"You once carried a blade for someone braver than you."},"Runaway Apprentice":{bonus:{magic:1,lore:1},text:"You fled a teacher who knew too much about the Lost Build."},"Debt-Bound Thief":{bonus:{thieving:1},gold:40,text:"Someone in Ashmere thinks you still owe them."},"Archivist's Child":{bonus:{lore:2},text:"You learned to read records before you learned to swing a weapon."},"Wandering Cook":{items:{food:3},bonus:{survival:1},text:"You know a road meal can save a life."},"Failed Monster Hunter":{bonus:{strength:1,survival:1},text:"The last hunt went badly. You survived anyway."}};
    const keepsakes={"Rusty Charm":{bonus:{luck:2},text:"A charm warm with impossible luck."},"Old Map":{bonus:{survival:2},text:"The ink shifts when roads change."},"Bent Coin":{sellBonus:.12,text:"A coin no shopkeeper likes to refuse."},"Cracked Tablet":{items:{rtab:2},bonus:{magic:1},text:"A runic shard from a lesson you forgot."},"Dull Knife":{bonus:{thieving:2},text:"Bad steel, good enough for a lock."},"Cooked Ration":{items:{food:5},text:"A small meal from before the road collapsed."}};

    const weapons=[{id:"hand",name:"Your Hand",attack:45,cost:0,level:1},{id:"woodenSword",name:"Wooden Sword",attack:85,cost:65,level:1},{id:"stoneSword",name:"Stone Sword",attack:110,cost:140,level:1},{id:"bronzeSword",name:"Bronze Sword",attack:140,cost:280,level:2},{id:"ironSword",name:"Iron Sword",attack:170,cost:650,level:4},{id:"steelSword",name:"Steel Sword",attack:210,cost:1400,level:7},{id:"crystalSword",name:"Crystal Sword",attack:260,cost:4200,level:12},{id:"runicSword",name:"Runic Sword",attack:320,cost:9000,level:18},{id:"mythicalGodsword",name:"Mythical Godsword",attack:460,cost:50,currency:"morb",level:25},{id:"alydrilGodsword",name:"Alydril Godsword",attack:620,cost:100,currency:"morb",level:30}];
    const armors=[{id:"none",name:"No Armor",defense:0,cost:0,level:1},{id:"clothArmor",name:"Cloth Armor",defense:10,cost:80,level:1},{id:"chainArmor",name:"Chain Armor",defense:22,cost:180,level:1},{id:"bronzeArmor",name:"Bronze Armor",defense:42,cost:380,level:2},{id:"ironArmor",name:"Iron Armor",defense:68,cost:850,level:4},{id:"steelArmor",name:"Steel Armor",defense:105,cost:1800,level:7},{id:"crystalArmor",name:"Crystal Armor",defense:150,cost:5000,level:12},{id:"runicArmor",name:"Runic Armor",defense:205,cost:11000,level:18},{id:"mythicalArmor",name:"Mythical Armor",defense:280,cost:65,currency:"morb",level:30},{id:"alydrilArmor",name:"Alydril Armor",defense:310,cost:120,currency:"morb",level:35}];
    const enemies=[{name:"Goblin",glyph:"👺",maxDamage:24,hp:[55,105],drop:["gmail",1,"Goblin Mail"]},{name:"Giant",glyph:"🗿",maxDamage:45,hp:[120,190],drop:["hbone",2,"Huge Bones"]},{name:"Dragon",glyph:"🐉",maxDamage:74,hp:[190,290],drop:["dhide",2,"Dragon Hides"]},{name:"Mage",glyph:"🧙",maxDamage:92,hp:[135,220],drop:["rtab",2,"Runic Tablets"]},{name:"Sorcerer",glyph:"🔮",maxDamage:105,hp:[150,240],drop:["potion",2,"Potions"]},{name:"Farmer",glyph:"🌾",maxDamage:35,hp:[75,130],drop:["seed",3,"Seeds"]},{name:"Bear",glyph:"🐻",maxDamage:80,hp:[160,255],drop:["fur",4,"Furs"]},{name:"Rockbeast",glyph:"🪨",maxDamage:110,hp:[210,330],drop:["ore",5,"Ore"]},{name:"Ent",glyph:"🌲",maxDamage:120,hp:[220,360],drop:["log",8,"Logs"]},{name:"Elemental",glyph:"✨",maxDamage:125,hp:[180,300],drop:["morb",2,"Magic Orbs"]},{name:"Rat",glyph:"🐀",maxDamage:22,hp:[40,80],drop:["fur",2,"Furs"]}];
    const prices={gmail:300,hbone:550,dhide:750,rtab:250,food:100,rfood:60,bait:2,potion:200,ingot:473,seed:150,bow:713,fur:200,gem:1000,log:275,ore:500,morb:15000,codeFragment:0};
    const itemNames={gmail:"Goblin Mail",hbone:"Huge Bones",dhide:"Dragon Hides",rtab:"Runic Tablets",food:"Food",rfood:"Raw Food",bait:"Bait",potion:"Potions",ingot:"Ingots",seed:"Seeds",bow:"Bows",fur:"Furs",gem:"Gemstones",log:"Logs",ore:"Ore",morb:"Magic Orbs",codeFragment:"Code Fragments"};
    const ascii={title:`        /\\                 /\\\n       /  \\___ LEGEND ____/  \\\n      /_________________________\\\n      |  []   []   []   []   [] |\n      |       RECOVERED BUILD    |\n      |__________________________|`,ashmere:`        /\\                 /\\\n       /  \\____ ASHMERE ____/  \\\n      /___________________________\\\n      | []   []   []   []   []   |\n      |      THE FIRST TOWN       |\n      |___________________________|`,road:`          .       .        .\n      ___|___ .   . ___|___\n  ____/   |   \\_____/   |   \\____\n      THE ROADS BEYOND ASHMERE`,keep:`        ______________________\n       /                      \\\n      /     THE HOLLOW KEEP    \\\n     /__________________________\\\n        ||  ||  ||  ||  ||`,ledger:`       ___________________\n      |  THE LEDGER HALL |\n      |  GOLD  RECORDS  |\n      |_____|_____|_____|`,commons:`        &&&        &&&\n      &&&&&  THE  &&&&&\n        &&  COMMONS &&\n          TRAIN / GATHER`,goblin:`       ,      ,\n      /(.-\"\"-.)\\\n  |\\  \\/  O O \\/  /|\n  | \\ /   __   \\ / |\n   \\_\\________/_/`};

    let player=null,enemy=null,locationName="Recovered Menu",log=[],explore=null,lastEvent=null;
    const weapon=()=>weapons.find(w=>w.id===player.weapon)||weapons[0];
    const armor=()=>armors.find(a=>a.id===player.armor)||armors[0];
    const mod=(skill)=>((classes[player.className]?.mod?.[skill]||0)+(origins[player.origin]?.bonus?.[skill]||0)+(keepsakes[player.keepsake]?.bonus?.[skill]||0));
    const save=()=>{if(player)localStorage.setItem(SAVE_KEY,JSON.stringify(player));};
    const load=()=>{let raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem(oldKey);if(!raw)return null;try{return normalize(JSON.parse(raw));}catch{return null;}};
    function normalize(p){p.world=p.world||"Eldermere";p.town=p.town||"Ashmere";p.origin=p.origin||"Lost Squire";p.keepsake=p.keepsake||"Rusty Charm";p.stats=p.stats||{monstersDefeated:0,timesDied:0,strongholdRuns:0,checksPassed:0,checksFailed:0};p.flags=p.flags||{introSeen:false,lacoyxDefeated:false,strongholdRumor:false};p.inventory=p.inventory||{};Object.keys(itemNames).forEach(k=>p.inventory[k]??=0);p.ownedWeapons=p.ownedWeapons||{hand:1};p.ownedArmor=p.ownedArmor||{none:1};p.memories=p.memories||["The old world was called by names that no longer belong here."];return p;}
    function addLog(m,t=""){log.unshift({m,t});log=log.slice(0,12)}
    function newPlayer(username,origin,className,keepsake){let cls=classes[className],org=origins[origin],keep=keepsakes[keepsake];let inv={gmail:0,hbone:0,dhide:0,rtab:0,food:0,rfood:0,bait:0,potion:1,ingot:0,seed:0,bow:0,fur:0,gem:0,log:0,ore:0,morb:0,codeFragment:0};Object.entries(org.items||{}).forEach(([k,v])=>inv[k]+=v);Object.entries(keep.items||{}).forEach(([k,v])=>inv[k]+=v);let ownedWeapons=Object.fromEntries(weapons.map(w=>[w.id,0]));let ownedArmor=Object.fromEntries(armors.map(a=>[a.id,0]));ownedWeapons.hand=1;ownedArmor.none=1;return{username,world:"Eldermere",town:"Ashmere",origin,className,keepsake,level:1,hp:cls.hp,maxHp:cls.hp,xp:0,xpUntil:420,xpBase:420,gold:cls.gold+(org.gold||0),weapon:"hand",armor:"none",ownedWeapons,ownedArmor,inventory:inv,bank:[0,0,0,0,0],skills:{Woodcutting:{level:1,xp:0,xpLeft:80,gain:34,check:"survival"},Cooking:{level:1,xp:0,xpLeft:80,gain:36,check:"craft"},Fishing:{level:1,xp:0,xpLeft:80,gain:30,check:"survival"},Mining:{level:1,xp:0,xpLeft:80,gain:32,check:"strength"},Smithing:{level:1,xp:0,xpLeft:80,gain:35,check:"craft"},Thieving:{level:1,xp:0,xpLeft:80,gain:36,check:"thieving"}},stats:{monstersDefeated:0,timesDied:0,strongholdRuns:0,checksPassed:0,checksFailed:0},flags:{introSeen:false,lacoyxDefeated:false,strongholdRumor:false},traits:[],memories:["You woke beneath a dead lantern outside Ashmere.",`Origin: ${origin}. ${org.text}`,`Keepsake: ${keepsake}. ${keep.text}`]};}

    function title(){player=load();root.innerHTML=`<div class="title-wrap"><section class="title-card"><div class="title-content"><div class="kicker">Recovered Build v0.3</div><pre class="ascii">${ascii.title}</pre><h1 class="game-title">LEGEND</h1><p class="title-lore">The old names are fading. The world is Eldermere now, and the first town is Ashmere. Beyond its gate, roads break into chance, choice, and memory.</p><div class="actions">${player?`<button class="btn primary" id="continue">Continue as ${esc(player.username)}</button>`:""}<button class="btn" id="new">New Recovered Save</button><a class="btn" href="blog.html">Devlog</a><a class="btn" href="updates.html">Newsletter</a><a class="btn" href="https://github.com/tdtria/LEGEND-RPG" target="_blank" rel="noopener">GitHub</a>${player?`<button class="btn danger" id="delete">Delete Browser Save</button>`:""}</div><p class="small" style="margin-top:18px">v0.3 adds Ashmere, origins, keepsakes, ASCII scenes, exploration events, D20 checks, Trading Post, and The Backroad Dealer.</p></div></section></div>`;if(player)document.getElementById("continue").onclick=()=>{addLog("Welcome back to Ashmere.","story");menu()};document.getElementById("new").onclick=createName;if(player)document.getElementById("delete").onclick=()=>{localStorage.removeItem(SAVE_KEY);localStorage.removeItem(oldKey);player=null;log=[];title()};}
    function createName(){root.innerHTML=`<div class="title-wrap"><section class="title-card"><div class="title-content"><div class="kicker">The Road Asks</div><h1 style="margin:0;color:var(--accent);font-size:clamp(2rem,7vw,5rem)">Who Are You?</h1><p class="title-lore">You wake beneath a dead lantern on a road you do not remember walking. Behind you, the path has collapsed into static. Ahead, a sign points toward Ashmere. Your hand closes around a cracked token. Your name is carved into it.</p><input id="name" placeholder="Name, no spaces"><div class="actions" style="margin-top:18px"><button class="btn primary" id="next">Continue</button><button class="btn" id="back">Back</button></div></div></section></div>`;document.getElementById("next").onclick=()=>{let n=document.getElementById("name").value.trim();if(!n||n.includes(" "))return alert("Your name can't be empty or contain spaces.");createOrigin(n)};document.getElementById("back").onclick=title;}
    function choosePage(step,heading,lore,items,onPick,back){root.innerHTML=`<div class="title-wrap"><section class="title-card"><div class="title-content"><div class="kicker">${step}</div><h1 style="margin:0;color:var(--accent);font-size:clamp(2rem,7vw,5rem)">${heading}</h1><p class="title-lore">${lore}</p><div class="list">${items.map(([name,data])=>`<button class="shop" data-pick="${esc(name)}"><h3>${esc(name)}</h3><p>${esc(data.desc||data.text)}</p></button>`).join("")}</div><div class="actions"><button class="btn" id="back">Back</button></div></div></section></div>`;document.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>onPick(b.dataset.pick));document.getElementById("back").onclick=back;}
    function createOrigin(name){choosePage("Character Creation","Choose Your Origin","Who were you before the road took you?",Object.entries(origins),(origin)=>createClass(name,origin),createName)}
    function createClass(name,origin){choosePage("Character Creation","Choose Your Class","What did the road leave you capable of becoming?",Object.entries(classes),(cls)=>createKeepsake(name,origin,cls),()=>createOrigin(name))}
    function createKeepsake(name,origin,cls){choosePage("Character Creation","Choose Your Keepsake","One thing came with you from before the static.",Object.entries(keepsakes),(keep)=>{player=newPlayer(name,origin,cls,keep);log=[];addLog("The cracked token warms in your palm.","story");addLog(`${name} enters Ashmere as a ${cls}.`,"story");save();intro()},()=>createClass(name,origin))}
    function intro(){layout("Ashmere Road","The Road to Ashmere",`You wake beneath a dead lantern on a road you do not remember walking.\n\nBehind you, the path has collapsed into static. Ahead, the first town waits behind a tired wooden gate.\n\nThe sign reads: ASHMERE.\n\nThe town bell rings once. Then the world remembers you.`,[{label:"Enter Ashmere",className:"primary",fn:menu}],`<pre class="ascii">${ascii.ashmere}</pre>`)}
    function topbar(){return`<header class="topbar"><div class="brand"><h1>LEGEND</h1><div class="sub">Recovered Build v0.3</div></div><div class="meta-grid"><div class="box"><span class="label">Location</span><span class="value">${locationName}</span></div><div class="box"><span class="label">Adventurer</span><span class="value">${esc(player.username)}</span></div></div><div class="meta-grid"><div class="box"><span class="label">Origin</span><span class="value">${esc(player.origin)}</span></div><div class="box"><span class="label">Class</span><span class="value">${esc(player.className)}</span></div></div></header>`}
    function stats(){let hp=clamp(player.hp/player.maxHp*100,0,100),xp=player.level>=37?100:clamp(100-player.xpUntil/player.xpBase*100,0,100),total=Object.values(player.skills).reduce((a,s)=>a+s.level,0);return`<section class="panel"><div class="panel-head"><div><h3>Character</h3><p>${weapon().name} / ${armor().name}</p></div></div><div class="stat-grid"><div class="stat"><span class="label">Health</span><span class="num">${player.hp}/${player.maxHp}</span><div class="bar red"><span style="width:${hp}%"></span></div></div><div class="stat"><span class="label">Level</span><span class="num">${player.level}</span><div class="bar"><span style="width:${xp}%"></span></div></div><div class="stat"><span class="label">Gold</span><span class="num gold">${player.gold}</span></div><div class="stat"><span class="label">Next</span><span class="num">${player.level>=37?"None":player.xpUntil}</span></div><div class="stat"><span class="label">Skill Total</span><span class="num">${total}</span></div><div class="stat"><span class="label">Checks</span><span class="num">${player.stats.checksPassed}/${player.stats.checksFailed}</span></div></div></section>`}

    function layout(place,titleText,content,actions=[],extra=""){locationName=place;root.innerHTML=`<div class="shell">${topbar()}<div class="layout"><section class="panel"><div class="panel-head"><div><h2>${titleText}</h2><p>${place}</p></div><span class="value">${player.keepsake}</span></div>${extra||""}<div class="text">${content}</div><div class="actions" style="margin-top:14px">${actions.map((a,i)=>`<button class="btn ${a.className||""}" data-action="${i}">${a.label}</button>`).join("")}</div></section><aside class="stack">${stats()}${quest()}${logs()}</aside></div></div>`;actions.forEach((a,i)=>document.querySelector(`[data-action="${i}"]`).onclick=a.fn)}
    function menu(){save();let cards=[["🛤️","Explore Beyond Ashmere","Choose a route, face events, roll checks, and return with loot.",exploreStart],["⚖️","Trading Post","Sell monster drops and gathered resources for gold.",tradingPost],["🕯️","The Backroad Dealer","Risky trades, strange rumors, and better prices for shady goods.",dealer],["🗡️","Weapon Shop","Buy stronger weapons with rebalanced early prices.",weaponShop],["🛡️","Armor Shop","Buy armor before the roads punish you.",armorShop],["✨","The Relic Market","Trade Magic Orbs for rare equipment.",relicMarket],["🌿","The Commons","Train skills through checks and resource events.",commons],["🏛️","The Ledger Hall","Store gold in five protected accounts.",ledger],["📜","The Archive Hall","Read quests and recovered memories.",archive],["👤","Character Sheet","Review origin, keepsake, traits, and stats.",sheet],["🏰","The Hollow Keep","Face Lacoyx when you are ready.",keepWarn],["💾","Save / Exit","Return to title.",title]];let html=`<pre class="ascii">${ascii.ashmere}</pre><div class="grid">${cards.map((c,i)=>`<button class="card" data-menu="${i}"><h3>${c[0]} ${c[1]}</h3><p>${c[2]}</p></button>`).join("")}</div>`;layout("Ashmere","Ashmere Menu","",[],html);cards.forEach((c,i)=>document.querySelector(`[data-menu="${i}"]`).onclick=c[3]);}

    const routes=[{name:"Old Road",risk:1,desc:"Safer road. More travelers, more small choices."},{name:"Greenwild Edge",risk:2,desc:"Trees crowd the path. Better gathering, more beasts."},{name:"Ruined Camps",risk:2,desc:"Old fires and abandoned packs. Good loot, some traps."},{name:"Static Scar",risk:3,desc:"A broken place where the Lost Build leaks through."}];

    function exploreStart(){explore={danger:0,steps:0,route:null};let html=`<pre class="ascii">${ascii.road}</pre><div class="list">${routes.map((r,i)=>`<button class="event-card" data-route="${i}"><h3>${r.name}</h3><p>${r.desc}</p><p class="small">Starting risk: ${r.risk}</p></button>`).join("")}</div>`;layout("Ashmere Gate","Choose a Route","",[{label:"Return to Ashmere",fn:menu}],html);document.querySelectorAll('[data-route]').forEach(b=>b.onclick=()=>{explore.route=routes[Number(b.dataset.route)];explore.danger=explore.route.risk;exploreEvent()})}
    function dangerPips(){let p="";for(let i=1;i<=6;i++)p+=`<span class="pip ${i<=explore.danger?(explore.danger>=5?'bad':'on'):''}"></span>`;return`<div class="danger-meter">${p}</div>`}

    function resolveChoice(i){let [label,skill,dc,success,fail]=lastEvent.choices[i];addLog(`Choice: ${label}.`);let r=d20(skill,dc+Math.max(0,explore.danger-2));if(r.ok)success();else fail();explore.danger+=rand(1,2);save();afterEvent();}
    function afterEvent(){layout("Roads Beyond Ashmere","The Road Continues",`The air shifts around the road. Danger rises, but so do the rewards.\n\nDanger Level: ${explore.danger}/6`,[{label:"Continue Exploring",className:"primary",fn:exploreEvent},{label:"Return to Ashmere",fn:returnTown}],`<pre class="ascii">${ascii.road}</pre>${dangerPips()}`)}
    function forcedEvent(){addLog("The road becomes too dangerous to ignore.","danger");startBattle(true)}
    function returnTown(){player.hp=clamp(player.hp,1,player.maxHp);addLog("You return to Ashmere with what you found.","story");explore=null;save();menu()}
    function startBattle(fromExplore=false){let t=enemies[rand(0,enemies.length-1)],scale=Math.max(0,player.level-1)+(explore?explore.danger*10:0);enemy={...t,level:rand(Math.max(1,player.level-1),player.level+Math.max(1,Math.ceil((explore?.danger||1)/2))),hp:rand(t.hp[0]+scale,t.hp[1]+scale),maxHp:0,fromExplore};enemy.maxHp=enemy.hp;addLog(`You encounter a level ${enemy.level} ${enemy.name}.`);battle()}
    function battle(){let ep=clamp(enemy.hp/enemy.maxHp*100,0,100),hp=clamp(player.hp/player.maxHp*100,0,100);let html=`<div class="battle"><div class="enemy"><div><div class="glyph">${enemy.glyph}</div><h2 class="red">${enemy.name}</h2><div class="muted">Level ${enemy.level}</div><div class="bar red" style="width:min(360px,72vw);margin:14px auto 0"><span style="width:${ep}%"></span></div><p class="small">${enemy.hp}/${enemy.maxHp} HP</p></div></div><div class="stack"><div class="stat"><span class="label">Your Health</span><span class="num">${player.hp}/${player.maxHp}</span><div class="bar red"><span style="width:${hp}%"></span></div></div><div class="stat"><span class="label">Weapon</span><span class="num gold">${weapon().name}</span><p class="small">Attack 1-${weapon().attack}</p></div><div class="stat"><span class="label">Armor</span><span class="num blue">${armor().name}</span><p class="small">Block 0-${armor().defense}</p></div><button class="btn primary" id="atk">Attack</button><button class="btn" id="inv">Battle Inventory</button>${enemy.name==="Lacoyx"?"":`<button class="btn" id="flee">Flee</button>`}</div></div>`;layout(enemy.name==="Lacoyx"?"The Hollow Keep":"Road Encounter","Battle","",[],html);document.getElementById('atk').onclick=attack;document.getElementById('inv').onclick=battleInv;let f=document.getElementById('flee');if(f)f.onclick=()=>{addLog("You flee back toward Ashmere.");enemy.fromExplore?returnTown():menu()}}
    function attack(){let bonus=player.className==="Warrior"?1.15:1;if(player.className==="Mage"&&player.inventory.rtab>0){player.inventory.rtab--;bonus=1.25;addLog("A Runic Tablet burns away as your strike twists with magic.","story")}let dmg=Math.min(enemy.hp,Math.floor(rand(1,weapon().attack)*bonus));enemy.hp-=dmg;let xp=Math.floor(dmg*.8);gainXP(xp);addLog(`You deal ${dmg} damage and gain ${xp} EXP.`);if(enemy.hp<=0)return win();enemyAttack()}

    function battleInv(){layout("Battle Inventory","Use Supplies",`Food: ${player.inventory.food}\nPotions: ${player.inventory.potion}\n\nUsing supplies gives the enemy a turn afterward.`,[{label:"Eat Food",fn:()=>useHeal('food',45)},{label:"Drink Potion",className:"primary",fn:()=>useHeal('potion',95)},{label:"Change Weapon",fn:()=>equip('weapon',true)},{label:"Change Armor",fn:()=>equip('armor',true)},{label:"Back",fn:battle}])}

    function gainXP(a){if(player.level>=37)return;player.xp+=a;player.xpUntil-=a;while(player.xpUntil<=0&&player.level<37){player.level++;player.xpBase+=420;player.xpUntil+=player.xpBase;player.maxHp+=player.className==="Warrior"?30:23;player.hp=player.maxHp;addLog(`Level up! You are now level ${player.level}.`,"story");if(player.level>=5)player.flags.strongholdRumor=true}}
    function trainSkillCheck(name,mult=1){let s=player.skills[name];let amount=s.gain*mult;s.xp+=amount;s.xpLeft-=amount;addLog(`${name} gains ${amount} XP.`);if(s.xpLeft<=0){let check=d20(s.check,9+s.level);if(check.ok){s.level++;s.xpLeft=80+s.level*32;addLog(`${name} leveled up to ${s.level}.`,"story")}else{s.xpLeft=30;addLog(`${name} is close to leveling, but the check failed. Try again.`,"danger")}}}
    function commons(){let html=`<pre class="ascii">${ascii.commons}</pre><div class="list">${Object.entries(player.skills).map(([n,s])=>`<button class="skill" data-skill="${n}"><h3>${n} - Level ${s.level}</h3><p>XP: ${s.xp} / Left: ${s.xpLeft}. Level-up check: ${s.check}.</p></button>`).join("")}</div>`;layout("The Commons","Skill Training","Training now uses checks. When a skill is ready to level, you must pass a related roll.",[{label:"Back to Ashmere",fn:menu}],html);document.querySelectorAll('[data-skill]').forEach(b=>b.onclick=()=>skillEvent(b.dataset.skill));}
    function skillEvent(n){let map={Woodcutting:['survival','Chop old branches',()=>gainItem('log',2)],Fishing:['survival','Cast into the mill stream',()=>gainItem('rfood',2)],Mining:['strength','Break loose ore',()=>gainItem('ore',2)],Cooking:['craft','Cook raw food',()=>{if(player.inventory.rfood>0){player.inventory.rfood--;gainItem('food',2)}else gainItem('food',1)}],Smithing:['craft','Work the small forge',()=>{if(player.inventory.ore>=2){player.inventory.ore-=2;gainItem('ingot',1)}else gainItem('ore',1)}],Thieving:['thieving','Practice sleight of hand',()=>gainGold(rand(20,75))]};let [sk,txt,reward]=map[n];let r=d20(sk,8+player.skills[n].level);if(r.ok){reward();trainSkillCheck(n,2)}else trainSkillCheck(n,1);save();commons()}
    function gainItem(k,a,show=true){player.inventory[k]=(player.inventory[k]||0)+a;if(show)addLog(`Gained ${a} ${itemNames[k]||k}.`)}function gainGold(a){player.gold+=a;addLog(`Gained ${a} gold.`)}function damage(a,b){let d=rand(a,b);player.hp-=d;addLog(`You take ${d} damage.`,"danger");if(player.hp<=0)die()}function heal(a,b){let h=rand(a,b);player.hp=clamp(player.hp+h,1,player.maxHp);addLog(`Healed ${h} HP.`)}function memory(m){if(!player.memories.includes(m))player.memories.push(m);addLog("Recovered Memory: "+m,"story")}function addTrait(t){if(!player.traits.includes(t))player.traits.push(t);addLog(`Trait gained: ${t}.`,"story")}

    function sheet(){layout("Character Sheet","Character Sheet",`Name: ${player.username}\nOrigin: ${player.origin}\nClass: ${player.className}\nKeepsake: ${player.keepsake}\nWorld: Eldermere\nTown: Ashmere\nTraits: ${player.traits.join(', ')||'None yet'}\n\nMemories:\n- ${player.memories.join('\n- ')}`,[{label:"Inventory",fn:inventory},{label:"Back to Ashmere",fn:menu}],`<pre class="ascii">${ascii.ashmere}</pre>`)}
    function inventory(){layout("Inventory","Inventory","",[{label:"Change Weapon",fn:()=>equip('weapon',false)},{label:"Change Armor",fn:()=>equip('armor',false)},{label:"Back",fn:menu}],inventoryHtml())}
    function equip(type,inBattle){let list=type==='weapon'?weapons:armors,owned=type==='weapon'?player.ownedWeapons:player.ownedArmor;let html=`<div class="list">${list.filter(x=>owned[x.id]).map(x=>`<button class="shop" data-equip="${x.id}"><h3>${x.name} ${player[type]===x.id?'[equipped]':''}</h3><p>${type==='weapon'?`Attack 1-${x.attack}`:`Block 0-${x.defense}`}. Owned: ${owned[x.id]}</p></button>`).join('')}</div>`;layout(type==='weapon'?"Weapon Select":"Armor Select","Choose Equipment","",[{label:"Back",fn:inBattle?battleInv:inventory}],html);document.querySelectorAll('[data-equip]').forEach(b=>b.onclick=()=>{player[type]=b.dataset.equip;addLog(`Equipped ${list.find(x=>x.id===b.dataset.equip).name}.`);save();inBattle?battleInv():inventory()})}

    function buy(item){let cur=item.currency||'gold';if(player.level<item.level){addLog(`Need level ${item.level}.`,'danger');return menu()}if(cur==='gold'){if(player.gold<item.cost){addLog('Not enough gold.','danger');return menu()}player.gold-=item.cost}else{if(player.inventory[cur]<item.cost){addLog('Not enough Magic Orbs.','danger');return menu()}player.inventory[cur]-=item.cost}if(weapons.some(w=>w.id===item.id))player.ownedWeapons[item.id]=(player.ownedWeapons[item.id]||0)+1;else player.ownedArmor[item.id]=(player.ownedArmor[item.id]||0)+1;addLog(`Bought ${item.name}.`,'story');save();menu()}

    function sellPrice(k){return Math.floor(prices[k]*(1+(keepsakes[player.keepsake]?.sellBonus||0)))}function sellItem(k){let q=player.inventory[k];if(q<=0)return tradingPost();let total=sellPrice(k)*q;player.inventory[k]=0;player.gold+=total;addLog(`Sold ${q} ${itemNames[k]} for ${total} gold.`,'story');save();tradingPost()}function sellAll(){Object.keys(prices).forEach(k=>{if(k!=='morb'&&k!=='codeFragment'&&player.inventory[k]>0)sellItem(k)});tradingPost()}
    function dealer(){let html=`<pre class="ascii">${ascii.road}</pre><div class="list"><button class="shop" id="rumor"><h3>Buy a Rumor - 75 gold</h3><p>The Backroad Dealer knows old names and bad roads.</p></button><button class="shop" id="mystery"><h3>Risky Trade - 3 Magic Orbs</h3><p>Trade for a random reward. Maybe valuable. Maybe not.</p></button><button class="shop" id="shady"><h3>Sell Magic Orb at Shady Rate</h3><p>Sell 1 Magic Orb for ${Math.floor(prices.morb*1.25)} gold.</p></button></div>`;layout("Backroad","The Backroad Dealer",`Dealer: I don't buy junk. I buy things the world forgot it owned.`,[{label:"Back to Ashmere",fn:menu}],html);document.getElementById('rumor').onclick=()=>{if(player.gold<75){addLog('Not enough gold.','danger');return dealer()}player.gold-=75;memory(['The Ledger Hall stores records older than Ashmere.','Lacoyx remembers the old labels for every item.','Some roads do not lead to places. They lead to versions.'][rand(0,2)]);save();dealer()};document.getElementById('mystery').onclick=()=>{if(player.inventory.morb<3){addLog('Not enough Magic Orbs.','danger');return dealer()}player.inventory.morb-=3;let r=rand(1,4);if(r===1)gainItem('gem',4);if(r===2)gainGold(2000);if(r===3)gainItem('potion',5);if(r===4)damage(5,25);save();dealer()};document.getElementById('shady').onclick=()=>{if(player.inventory.morb<1){addLog('No Magic Orbs.','danger');return dealer()}player.inventory.morb--;gainGold(Math.floor(prices.morb*1.25));save();dealer()}}
    function ledger(){let html=`<pre class="ascii">${ascii.ledger}</pre><div class="list">${player.bank.map((g,i)=>`<div class="quest"><h3>Ledger Account ${i+1}</h3><p>Stored gold: <span class="gold">${g}</span></p><div class="actions"><button class="btn" data-dep="${i}">Deposit All</button><button class="btn" data-wit="${i}">Withdraw All</button></div></div>`).join('')}</div>`;layout("The Ledger Hall","The Ledger Hall","A vault of gold, records, and old save logic.",[{label:"Back",fn:menu}],html);document.querySelectorAll('[data-dep]').forEach(b=>b.onclick=()=>{let i=+b.dataset.dep,room=1e9-player.bank[i],amt=Math.min(room,player.gold);player.bank[i]+=amt;player.gold-=amt;addLog(`Deposited ${amt} gold.`);save();ledger()});document.querySelectorAll('[data-wit]').forEach(b=>b.onclick=()=>{let i=+b.dataset.wit,amt=player.bank[i];player.gold+=amt;player.bank[i]=0;addLog(`Withdrew ${amt} gold.`);save();ledger()})}
    function archive(){let html=`<div class="list"><div class="quest"><h3>The Roads Beyond Ashmere</h3><p>Explore events, pass checks, and return with materials.</p></div><div class="quest"><h3>The Hollow Keep</h3><p>Reach level 5 and face Lacoyx.</p></div><div class="quest"><h3>Recovered Memories</h3><p>${player.memories.length} memories recovered.</p></div></div>`;layout("The Archive Hall","The Archive Hall","The Archive Hall remembers quests from a world that rolled back.",[{label:"Read Memories",fn:()=>layout('Archive Hall','Recovered Memories',player.memories.map(m=>'- '+m).join('\n'),[{label:'Back',fn:archive},{label:'Ashmere',fn:menu}])},{label:"Back",fn:menu}],html)}
    function keepWarn(){let ok=player.level>=5||player.flags.strongholdRumor;layout("The Hollow Keep","The Hollow Keep",`${ok?'The gate recognizes your recovered level.':'The gate is sealed. Reach level 5 first.'}\n\nLacoyx waits below. You cannot flee from him.`,[...(ok?[{label:"Enter The Hollow Keep",className:"primary",fn:boss}]:[]),{label:"Back",fn:menu}],`<pre class="ascii">${ascii.keep}</pre>`)}
    function boss(){player.stats.strongholdRuns++;enemy={name:'Lacoyx',glyph:'♛',level:741,hp:2780,maxHp:2780,maxDamage:520,drop:['morb',25,'Magic Orbs'],fromExplore:false};addLog('Lacoyx: You renamed the world, but I remember the old one.','danger');battle()}
    title();
  </script>
</body>
</html>
