  <style>

    .title-wrap{min-height:calc(100vh - 44px);display:grid;place-items:center;padding:18px}.title-card{width:min(1000px,100%);padding:clamp(24px,5vw,56px);position:relative;overflow:hidden}.title-card:before{content:"";position:absolute;inset:-40%;background:conic-gradient(from 30deg,transparent,rgba(125,255,173,.08),transparent,rgba(255,211,105,.07),transparent);animation:spin 18s linear infinite;opacity:.6}@keyframes spin{to{transform:rotate(360deg)}}.title-content{position:relative;z-index:1}.kicker{color:var(--gold);text-transform:uppercase;letter-spacing:.25em;margin:18px 0 8px}.game-title{margin:0;color:var(--accent);font-size:clamp(3.2rem,13vw,9.5rem);letter-spacing:.18em;line-height:.85;text-shadow:0 0 24px rgba(125,255,173,.42),0 6px 0 rgba(0,0,0,.35)}.title-lore{max-width:780px;color:#d7efe0;font-size:1.05rem;line-height:1.7;margin:18px 0 26px}.actions,.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.btn{border:1px solid rgba(132,255,178,.28);background:linear-gradient(180deg,rgba(31,54,44,.96),rgba(10,18,15,.96));color:var(--text);min-height:46px;border-radius:12px;padding:11px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:.16s ease}.btn:hover,.card:hover,.shop:hover,.skill:hover,.event-card:hover,.npc-card:hover{transform:translateY(-2px);border-color:rgba(255,211,105,.55);box-shadow:0 0 22px rgba(255,211,105,.11),0 14px 24px rgba(0,0,0,.2)}.btn.primary{border-color:rgba(255,211,105,.46);color:#231a04;background:linear-gradient(180deg,#ffe29a,#d69f32);font-weight:900}.btn.danger{border-color:rgba(255,107,107,.5);color:var(--red);background:rgba(45,9,9,.6)}input{background:rgba(0,0,0,.5);color:var(--text);border:1px solid rgba(132,255,178,.28);border-radius:12px;padding:13px 14px;min-width:min(330px,100%);outline:none}input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,211,105,.08)}
    .layout{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(340px,.8fr);gap:14px;flex:1}.panel{padding:16px}.panel-head{display:flex;justify-content:space-between;align-items:end;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(132,255,178,.13)}.panel-head h2,.panel-head h3{margin:0;color:var(--accent);letter-spacing:.04em}.panel-head p{margin:4px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.stack{display:flex;flex-direction:column;gap:14px}.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat .num{color:var(--text);font-size:1.02rem;font-weight:800}.bar{height:9px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:8px;border:1px solid rgba(255,255,255,.07)}.bar>span{display:block;height:100%;background:linear-gradient(90deg,#46c77a,#7dffad);border-radius:inherit}.bar.red>span{background:linear-gradient(90deg,#b52424,#ff6b6b)}.bar.gold>span{background:linear-gradient(90deg,#a96b12,#ffd369)}.log{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow:auto;padding-right:4px}.log-entry{background:rgba(255,255,255,.035);border-left:3px solid rgba(125,255,173,.44);border-radius:10px;padding:10px 12px;color:#d9f1e2;line-height:1.35}.log-entry.story{border-left-color:var(--gold);color:#fff0c2}.log-entry.danger{border-left-color:var(--red);color:#ffd3d3}.text{color:#e7f5ec;line-height:1.65;font-size:1.02rem;white-space:pre-wrap}.ascii{font-family:Consolas,"Courier New",monospace;color:var(--accent);background:rgba(0,0,0,.25);border:1px solid rgba(125,255,173,.18);border-radius:14px;padding:14px;margin-bottom:14px;overflow:auto;line-height:1.15;text-shadow:0 0 10px rgba(125,255,173,.22)}.list{display:grid;gap:10px}.card,.shop,.skill,.event-card,.npc-card{width:100%;text-align:left;color:var(--text);cursor:pointer;transition:.16s ease}.card h3,.shop h3,.skill h3,.event-card h3,.quest h3,.npc-card h3{margin:0 0 6px;color:var(--gold)}.card p,.shop p,.skill p,.event-card p,.quest p,.npc-card p{margin:0;color:var(--muted);line-height:1.4}.battle{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.enemy{min-height:360px;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at center,rgba(255,107,107,.11),transparent 40%),rgba(0,0,0,.24);border:1px solid rgba(255,107,107,.22);border-radius:18px;padding:18px;position:relative;overflow:hidden}.enemy:before{content:"";position:absolute;width:240px;height:240px;border:1px solid rgba(255,107,107,.18);border-radius:50%;box-shadow:0 0 40px rgba(255,107,107,.08);animation:pulse 3s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(.96);opacity:.65}50%{transform:scale(1.08);opacity:1}}.glyph{font-size:clamp(4rem,10vw,8rem);filter:drop-shadow(0 0 18px rgba(255,107,107,.38));position:relative;z-index:1}.small{color:var(--muted);font-size:.9rem;line-height:1.45}.choice-row{display:grid;gap:10px;margin-top:14px}.danger-meter{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:8px}.pip{height:10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}.pip.on{background:linear-gradient(90deg,#a96b12,#ffd369)}.pip.bad{background:linear-gradient(90deg,#b52424,#ff6b6b)}.dialogue{border-left:4px solid var(--gold);background:rgba(255,211,105,.07);border-radius:14px;padding:14px;margin-bottom:14px}.dialogue strong{color:var(--gold)}
    @media(max-width:1100px){.topbar,.layout,.battle{grid-template-columns:1fr}.meta-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:720px){.shell{width:min(100vw - 16px,1440px);margin:8px auto}.grid,.stat-grid,.meta-grid{grid-template-columns:1fr}.brand h1,.game-title{letter-spacing:.10em}.panel-head{align-items:start;flex-direction:column}.actions{flex-direction:column;align-items:stretch}.btn{width:100%}}

<body>
  <div id="root"></div>
  <script>
    const SAVE_KEY="legend-recovered-build-v04",oldKey="legend-recovered-build-v03",oldKey2="legend-recovered-build-v02";
    const root=document.getElementById('root'),rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const esc=s=>String(s).replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
    const classes={Adventurer:{hp:105,gold:120,mod:{survival:1,luck:1},move:'Lucky Strike',desc:'Balanced survivor. Good for a first run.'},Warrior:{hp:135,gold:90,mod:{strength:3},move:'Cleave',desc:'High HP and better force checks.'},Ranger:{hp:112,gold:100,mod:{survival:3,agility:1},move:'Trap Shot',desc:'Better road sense, scouting, and fleeing.'},Mage:{hp:85,gold:130,mod:{magic:3,lore:1},move:'Rune Bolt',desc:'Runic power and better strange-event checks.'},Thief:{hp:95,gold:160,mod:{thieving:3,agility:1},move:'Swipe',desc:'Better stealing, locks, and risky rewards.'},Skiller:{hp:92,gold:125,mod:{craft:2,survival:1},move:'Improvised Tool',desc:'Better gathering, crafting, and non-combat play.'}};
    const origins={"Lost Squire":{bonus:{strength:1},text:'You once carried a blade for someone braver than you.'},"Runaway Apprentice":{bonus:{magic:1,lore:1},text:'You fled a teacher who knew too much about the Lost Build.'},"Debt-Bound Thief":{bonus:{thieving:1},gold:40,text:'Someone in Ashmere thinks you still owe them.'},"Archivist's Child":{bonus:{lore:2},text:'You learned to read records before you learned to swing a weapon.'},"Wandering Cook":{items:{food:3},bonus:{survival:1},text:'You know a road meal can save a life.'},"Failed Monster Hunter":{bonus:{strength:1,survival:1},text:'The last hunt went badly. You survived anyway.'}};
    const keepsakes={"Rusty Charm":{bonus:{luck:2},text:'A charm warm with impossible luck.'},"Old Map":{bonus:{survival:2},text:'The ink shifts when roads change.'},"Bent Coin":{sellBonus:.12,text:'A coin no shopkeeper likes to refuse.'},"Cracked Tablet":{items:{rtab:2},bonus:{magic:1},text:'A runic shard from a lesson you forgot.'},"Dull Knife":{bonus:{thieving:2},text:'Bad steel, good enough for a lock.'},"Cooked Ration":{items:{food:5},text:'A small meal from before the road collapsed.'}};
    const weapons=[['hand','Your Hand',45,0,1],['woodenSword','Wooden Sword',85,65,1],['stoneSword','Stone Sword',110,140,1],['bronzeSword','Bronze Sword',140,280,2],['ironSword','Iron Sword',170,650,4],['steelSword','Steel Sword',210,1400,7],['crystalSword','Crystal Sword',260,4200,12],['runicSword','Runic Sword',320,9000,18],['mythicalGodsword','Mythical Godsword',460,50,25,'morb'],['alydrilGodsword','Alydril Godsword',620,100,30,'morb']].map(x=>({id:x[0],name:x[1],attack:x[2],cost:x[3],level:x[4],currency:x[5]}));
    const armors=[['none','No Armor',0,0,1],['clothArmor','Cloth Armor',10,80,1],['chainArmor','Chain Armor',22,180,1],['bronzeArmor','Bronze Armor',42,380,2],['ironArmor','Iron Armor',68,850,4],['steelArmor','Steel Armor',105,1800,7],['crystalArmor','Crystal Armor',150,5000,12],['runicArmor','Runic Armor',205,11000,18],['mythicalArmor','Mythical Armor',280,65,30,'morb'],['alydrilArmor','Alydril Armor',310,120,35,'morb']].map(x=>({id:x[0],name:x[1],defense:x[2],cost:x[3],level:x[4],currency:x[5]}));
    const enemies=[{name:'Goblin',glyph:'👺',maxDamage:24,hp:[55,105],drop:['gmail',1,'Goblin Mail'],intent:['slashes wildly','guards its pouch','lunges low'],weak:'guard'},{name:'Giant',glyph:'🗿',maxDamage:45,hp:[120,190],drop:['hbone',2,'Huge Bones'],intent:['winds up a heavy blow','stomps the road','raises both fists'],weak:'agility'},{name:'Dragon',glyph:'🐉',maxDamage:74,hp:[190,290],drop:['dhide',2,'Dragon Hides'],intent:['draws a burning breath','spreads its wings','scrapes the ground'],weak:'magic'},{name:'Mage',glyph:'🧙',maxDamage:92,hp:[135,220],drop:['rtab',2,'Runic Tablets'],intent:['chants a cracked spell','lifts a runic tablet','studies your stance'],weak:'thieving'},{name:'Sorcerer',glyph:'🔮',maxDamage:105,hp:[150,240],drop:['potion',2,'Potions'],intent:['warps the air','cups a purple flame','laughs at the rules'],weak:'magic'},{name:'Farmer',glyph:'🌾',maxDamage:35,hp:[75,130],drop:['seed',3,'Seeds'],intent:['raises a pitchfork','backs away','calls for help'],weak:'talk'},{name:'Bear',glyph:'🐻',maxDamage:80,hp:[160,255],drop:['fur',4,'Furs'],intent:['lowers its head','sniffs for weakness','prepares to charge'],weak:'trap'},{name:'Rockbeast',glyph:'🪨',maxDamage:110,hp:[210,330],drop:['ore',5,'Ore'],intent:['cracks its stone arms','rumbles forward','hardens its shell'],weak:'strength'},{name:'Ent',glyph:'🌲',maxDamage:120,hp:[220,360],drop:['log',8,'Logs'],intent:['roots into the dirt','swings a branch','creaks in old speech'],weak:'fire'},{name:'Elemental',glyph:'✨',maxDamage:125,hp:[180,300],drop:['morb',2,'Magic Orbs'],intent:['flickers between forms','pulls light inward','splits into sparks'],weak:'lore'},{name:'Rat',glyph:'🐀',maxDamage:22,hp:[40,80],drop:['fur',2,'Furs'],intent:['skitters around your boots','bares its teeth','looks for an opening'],weak:'trap'}];
    const prices={gmail:300,hbone:550,dhide:750,rtab:250,food:100,rfood:60,bait:2,potion:200,ingot:473,seed:150,bow:713,fur:200,gem:1000,log:275,ore:500,morb:15000,codeFragment:0,bellFragment:0};
    const itemNames={gmail:'Goblin Mail',hbone:'Huge Bones',dhide:'Dragon Hides',rtab:'Runic Tablets',food:'Food',rfood:'Raw Food',bait:'Bait',potion:'Potions',ingot:'Ingots',seed:'Seeds',bow:'Bows',fur:'Furs',gem:'Gemstones',log:'Logs',ore:'Ore',morb:'Magic Orbs',codeFragment:'Code Fragments',bellFragment:'Bell Fragments'};
    const ascii={title:`        /\\                 /\\\n       /  \\___ LEGEND ____/  \\\n      /_________________________\\\n      |  []   []   []   []   [] |\n      |       RECOVERED BUILD    |\n      |__________________________|`,ashmere:`        /\\                 /\\\n       /  \\____ ASHMERE ____/  \\\n      /___________________________\\\n      | []   []   []   []   []   |\n      |      THE FIRST TOWN       |\n      |___________________________|`,road:`          .       .        .\n      ___|___ .   . ___|___\n  ____/   |   \\_____/   |   \\____\n      THE ROADS BEYOND ASHMERE`,keep:`        ______________________\n       /                      \\\n      /     THE HOLLOW KEEP    \\\n     /__________________________\\\n        ||  ||  ||  ||  ||`,ledger:`       ___________________\n      |  THE LEDGER HALL |\n      |  GOLD  RECORDS  |\n      |_____|_____|_____|`,commons:`        &&&        &&&\n      &&&&&  THE  &&&&&\n        &&  COMMONS &&\n          TRAIN / GATHER`,bell:`            _______\n           /       \\\n          /  BELL   \\\n          | FRAGMENT |\n          \\_________/\n             || ||`,npc:`        .-\"\"\"-.\n       /  o o  \\\n       |   ^   |\n       |  '-'  |\n       '-------'`,goblin:`       ,      ,\n      /(.-\"\"-.)\\\n  |\\  \\/  O O \\/  /|\n  | \\ /   __   \\ / |\n   \\_\\________/_/`};
    let player=null,enemy=null,locationName='Recovered Menu',log=[],explore=null,lastEvent=null,guarded=false;
    const weapon=()=>weapons.find(w=>w.id===player.weapon)||weapons[0],armor=()=>armors.find(a=>a.id===player.armor)||armors[0];
    const mod=s=>((classes[player.className]?.mod?.[s]||0)+(origins[player.origin]?.bonus?.[s]||0)+(keepsakes[player.keepsake]?.bonus?.[s]||0));
    const save=()=>{if(player)localStorage.setItem(SAVE_KEY,JSON.stringify(player))};
    const load=()=>{let raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem(oldKey)||localStorage.getItem(oldKey2);if(!raw)return null;try{return normalize(JSON.parse(raw))}catch{return null}};
    function normalize(p){p.world=p.world||'Eldermere';p.town=p.town||'Ashmere';p.origin=p.origin||'Lost Squire';p.keepsake=p.keepsake||'Rusty Charm';p.stats=p.stats||{};Object.assign(p.stats,{monstersDefeated:p.stats.monstersDefeated||0,timesDied:p.stats.timesDied||0,strongholdRuns:p.stats.strongholdRuns||0,checksPassed:p.stats.checksPassed||0,checksFailed:p.stats.checksFailed||0});p.flags=p.flags||{};Object.assign(p.flags,{introSeen:!!p.flags.introSeen,lacoyxDefeated:!!p.flags.lacoyxDefeated,strongholdRumor:!!p.flags.strongholdRumor,bellQuestStarted:!!p.flags.bellQuestStarted,bellRoadSearched:!!p.flags.bellRoadSearched,bellQuestComplete:!!p.flags.bellQuestComplete,metMara:!!p.flags.metMara,metBrenn:!!p.flags.metBrenn});p.inventory=p.inventory||{};Object.keys(itemNames).forEach(k=>p.inventory[k]??=0);p.ownedWeapons=p.ownedWeapons||{hand:1};p.ownedArmor=p.ownedArmor||{none:1};p.memories=p.memories||['The old world was called by names that no longer belong here.'];p.traits=p.traits||[];p.momentum=p.momentum||0;p.questLog=p.questLog||[];p.mastery=p.mastery||{};Object.keys(p.skills||{}).forEach(k=>p.mastery[k]??=0);return p}
    function addLog(m,t=''){log.unshift({m,t});log=log.slice(0,12)}function addTrait(t){if(!player.traits.includes(t))player.traits.push(t);addLog('Trait gained: '+t,'story')}function memory(m){if(!player.memories.includes(m))player.memories.push(m);addLog('Recovered Memory: '+m,'story')}function questNote(q){if(!player.questLog.includes(q))player.questLog.push(q)}
    function newPlayer(username,origin,className,keepsake){let cls=classes[className],org=origins[origin],keep=keepsakes[keepsake],inv={gmail:0,hbone:0,dhide:0,rtab:0,food:0,rfood:0,bait:0,potion:1,ingot:0,seed:0,bow:0,fur:0,gem:0,log:0,ore:0,morb:0,codeFragment:0,bellFragment:0};Object.entries(org.items||{}).forEach(([k,v])=>inv[k]+=v);Object.entries(keep.items||{}).forEach(([k,v])=>inv[k]+=v);let ownedWeapons=Object.fromEntries(weapons.map(w=>[w.id,0])),ownedArmor=Object.fromEntries(armors.map(a=>[a.id,0]));ownedWeapons.hand=1;ownedArmor.none=1;let skills={Woodcutting:{level:1,xp:0,xpLeft:80,gain:34,check:'survival'},Cooking:{level:1,xp:0,xpLeft:80,gain:36,check:'craft'},Fishing:{level:1,xp:0,xpLeft:80,gain:30,check:'survival'},Mining:{level:1,xp:0,xpLeft:80,gain:32,check:'strength'},Smithing:{level:1,xp:0,xpLeft:80,gain:35,check:'craft'},Thieving:{level:1,xp:0,xpLeft:80,gain:36,check:'thieving'}};return{username,world:'Eldermere',town:'Ashmere',origin,className,keepsake,level:1,hp:cls.hp,maxHp:cls.hp,xp:0,xpUntil:420,xpBase:420,gold:cls.gold+(org.gold||0),weapon:'hand',armor:'none',ownedWeapons,ownedArmor,inventory:inv,bank:[0,0,0,0,0],skills,mastery:Object.fromEntries(Object.keys(skills).map(k=>[k,0])),stats:{monstersDefeated:0,timesDied:0,strongholdRuns:0,checksPassed:0,checksFailed:0},flags:{introSeen:false,lacoyxDefeated:false,strongholdRumor:false,bellQuestStarted:false,bellRoadSearched:false,bellQuestComplete:false,metMara:false,metBrenn:false},traits:[],momentum:0,questLog:[],memories:['You woke beneath a dead lantern outside Ashmere.',`Origin: ${origin}. ${org.text}`,`Keepsake: ${keepsake}. ${keep.text}`]}}
    function title(){player=load();root.innerHTML=`<div class="title-wrap"><section class="title-card"><div class="title-content"><div class="kicker">Recovered Build v0.4</div><pre class="ascii">${ascii.title}</pre><h1 class="game-title">LEGEND</h1><p class="title-lore">Ashmere has voices now. The bell rang once, nobody admits they heard it, and the roads beyond town are starting to answer back.</p><div class="actions">${player?`<button class="btn primary" id="continue">Continue as ${esc(player.username)}</button>`:''}<button class="btn" id="new">New Recovered Save</button><a class="btn" href="blog.html">Devlog</a><a class="btn" href="updates.html">Newsletter</a><a class="btn" href="https://github.com/tdtria/LEGEND-RPG" target="_blank" rel="noopener">GitHub</a>${player?`<button class="btn danger" id="delete">Delete Browser Save</button>`:''}</div><p class="small" style="margin-top:18px">v0.4 adds NPCs, dialogue, The Bell That Rang Once questline, enemy intent, guard, class abilities, momentum, camp choices, and a browser tab icon.</p></div></section></div>`;if(player)document.getElementById('continue').onclick=()=>{addLog('Welcome back to Ashmere.','story');menu()};document.getElementById('new').onclick=createName;if(player)document.getElementById('delete').onclick=()=>{localStorage.removeItem(SAVE_KEY);localStorage.removeItem(oldKey);localStorage.removeItem(oldKey2);player=null;log=[];title()}}
    function createName(){root.innerHTML=`<div class="title-wrap"><section class="title-card"><div class="title-content"><div class="kicker">The Road Asks</div><h1 style="margin:0;color:var(--accent);font-size:clamp(2rem,7vw,5rem)">Who Are You?</h1><p class="title-lore">You wake beneath a dead lantern. Behind you, the path has collapsed into static. Ahead, a sign points toward Ashmere. Your cracked token has a name on it.</p><input id="name" placeholder="Name, no spaces"><div class="actions" style="margin-top:18px"><button class="btn primary" id="next">Continue</button><button class="btn" id="back">Back</button></div></div></section></div>`;document.getElementById('next').onclick=()=>{let n=document.getElementById('name').value.trim();if(!n||n.includes(' '))return alert("Your name can't be empty or contain spaces.");chooseOrigin(n)};document.getElementById('back').onclick=title}
    function choosePage(step,heading,lore,items,onPick,back){root.innerHTML=`<div class="title-wrap"><section class="title-card"><div class="title-content"><div class="kicker">${step}</div><h1 style="margin:0;color:var(--accent);font-size:clamp(2rem,7vw,5rem)">${heading}</h1><p class="title-lore">${lore}</p><div class="list">${items.map(([n,d])=>`<button class="shop" data-pick="${esc(n)}"><h3>${esc(n)}</h3><p>${esc(d.desc||d.text)}</p></button>`).join('')}</div><div class="actions"><button class="btn" id="back">Back</button></div></div></section></div>`;document.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>onPick(b.dataset.pick));document.getElementById('back').onclick=back}
    function chooseOrigin(n){choosePage('Character Creation','Choose Your Origin','Who were you before the road took you?',Object.entries(origins),o=>chooseClass(n,o),createName)}function chooseClass(n,o){choosePage('Character Creation','Choose Your Class','What did the road leave you capable of becoming?',Object.entries(classes),c=>chooseKeepsake(n,o,c),()=>chooseOrigin(n))}function chooseKeepsake(n,o,c){choosePage('Character Creation','Choose Your Keepsake','One thing came with you from before the static.',Object.entries(keepsakes),k=>{player=newPlayer(n,o,c,k);log=[];addLog('The cracked token warms in your palm.','story');save();intro()},()=>chooseClass(n,o))}
    function topbar(){return`<header class="topbar"><div class="brand"><h1>LEGEND</h1><div class="sub">Recovered Build v0.4</div></div><div class="meta-grid"><div class="box"><span class="label">Location</span><span class="value">${locationName}</span></div><div class="box"><span class="label">Adventurer</span><span class="value">${esc(player.username)}</span></div></div><div class="meta-grid"><div class="box"><span class="label">Origin</span><span class="value">${esc(player.origin)}</span></div><div class="box"><span class="label">Class</span><span class="value">${esc(player.className)}</span></div></div></header>`}
    function stats(){let hp=clamp(player.hp/player.maxHp*100,0,100),xp=player.level>=37?100:clamp(100-player.xpUntil/player.xpBase*100,0,100),total=Object.values(player.skills).reduce((a,s)=>a+s.level,0);return`<section class="panel"><div class="panel-head"><div><h3>Character</h3><p>${weapon().name} / ${armor().name}</p></div></div><div class="stat-grid"><div class="stat"><span class="label">Health</span><span class="num">${player.hp}/${player.maxHp}</span><div class="bar red"><span style="width:${hp}%"></span></div></div><div class="stat"><span class="label">Level</span><span class="num">${player.level}</span><div class="bar"><span style="width:${xp}%"></span></div></div><div class="stat"><span class="label">Gold</span><span class="num gold">${player.gold}</span></div><div class="stat"><span class="label">Momentum</span><span class="num purple">${player.momentum||0}/5</span></div><div class="stat"><span class="label">Skill Total</span><span class="num">${total}</span></div><div class="stat"><span class="label">Checks</span><span class="num">${player.stats.checksPassed}/${player.stats.checksFailed}</span></div></div></section>`}
    function quest(){let q=player.flags.bellQuestComplete?'The bell fragment rests in your pack. The Hollow Keep feels closer.':player.flags.bellRoadSearched?'Bring the Bell Fragment to Brenn in The Ledger Hall.':player.flags.bellQuestStarted?'Search the road where you woke for proof that the bell rang.':'Speak to Mara Vell in The Archive Hall.';return`<section class="panel"><div class="panel-head"><div><h3>Current Quest</h3><p>The Bell That Rang Once</p></div></div><p class="text" style="font-size:.95rem">${q}</p></section>`}
    function logs(){return`<section class="panel"><div class="panel-head"><div><h3>World Log</h3><p>Recent events</p></div></div><div class="log">${log.length?log.map(l=>`<div class="log-entry ${l.t}">${esc(l.m)}</div>`).join(''):`<div class="log-entry story">The world waits for input.</div>`}</div></section>`}
    function layout(place,titleText,content,actions=[],extra=''){locationName=place;root.innerHTML=`<div class="shell">${topbar()}<div class="layout"><section class="panel"><div class="panel-head"><div><h2>${titleText}</h2><p>${place}</p></div><span class="value">${player.keepsake}</span></div>${extra||''}<div class="text">${content}</div><div class="actions" style="margin-top:14px">${actions.map((a,i)=>`<button class="btn ${a.className||''}" data-action="${i}">${a.label}</button>`).join('')}</div></section><aside class="stack">${stats()}${quest()}${logs()}</aside></div></div>`;actions.forEach((a,i)=>document.querySelector(`[data-action="${i}"]`).onclick=a.fn)}
    function intro(){player.flags.introSeen=true;save();layout('Ashmere Road','The Road to Ashmere',`You wake beneath a dead lantern. Behind you, the path has collapsed into static. Ahead, the first town waits behind a tired wooden gate.\n\nThe sign reads: ASHMERE.\n\nThe town bell rings once. Then the world remembers you.`,[{label:'Enter Ashmere',className:'primary',fn:menu}],`<pre class="ascii">${ascii.ashmere}</pre>`)}
    function menu(){save();let cards=[['🛤️','Explore Beyond Ashmere','Choose a route, face events, roll checks, camp, and return with loot.',exploreStart],['👥','People of Ashmere','Speak with NPCs and follow the first real questline.',people],['⚖️','Trading Post','Sell monster drops and gathered resources for gold.',tradingPost],['🕯️','The Backroad Dealer','Risky trades, strange rumors, and better prices for shady goods.',dealer],['🗡️','Weapon Shop','Buy stronger weapons with rebalanced early prices.',weaponShop],['🛡️','Armor Shop','Buy armor before the roads punish you.',armorShop],['✨','The Relic Market','Trade Magic Orbs for rare equipment.',relicMarket],['🌿','The Commons','Train skills through checks and mastery progress.',commons],['🏛️','The Ledger Hall','Store gold and ask Brenn about old records.',ledger],['📜','The Archive Hall','Speak with Mara and read recovered memories.',archive],['👤','Character Sheet','Review origin, keepsake, traits, mastery, and quest log.',sheet],['🏰','The Hollow Keep','Face Lacoyx when you are ready.',keepWarn],['💾','Save / Exit','Return to title.',title]];let html=`<pre class="ascii">${ascii.ashmere}</pre><div class="grid">${cards.map((c,i)=>`<button class="card" data-menu="${i}"><h3>${c[0]} ${c[1]}</h3><p>${c[2]}</p></button>`).join('')}</div>`;layout('Ashmere','Ashmere Menu','',[],html);cards.forEach((c,i)=>document.querySelector(`[data-menu="${i}"]`).onclick=c[3])}
    function d20(skill,dc){let roll=rand(1,20),bonus=mod(skill),total=roll+bonus,ok=total>=dc;if(ok){player.stats.checksPassed++;player.momentum=clamp((player.momentum||0)+1,0,5)}else player.stats.checksFailed++;addLog(`${skill[0].toUpperCase()+skill.slice(1)} Check: d20(${roll}) + ${bonus} = ${total} vs DC ${dc}. ${ok?'Success!':'Failure.'}`,ok?'story':'danger');return{ok,total,roll,bonus}}
    const npcs={mara:{name:'Mara Vell',place:'The Archive Hall',role:'Archive Keeper',text:'The bell has not rung since the rollback. If you heard it, the world was calling you by name.',topics:[['Ask about the bell',()=>{player.flags.metMara=true;player.flags.bellQuestStarted=true;questNote('The Bell That Rang Once: Search the road where you woke.');memory('Mara says the Ashmere bell has not worked since the rollback.');addLog('Quest started: The Bell That Rang Once.','story');people()}],['Ask about Lacoyx',()=>{memory('Mara believes Lacoyx remembers the old item names.');people()}]]},brenn:{name:'Old Brenn',place:'The Ledger Hall',role:'Ledger Keeper',text:'Gold is easy to count. Names are harder. Yours was written here before you arrived.',topics:[['Show Bell Fragment',()=>{if(player.inventory.bellFragment>0){player.flags.bellQuestComplete=true;player.inventory.bellFragment--;gainGold(350);gainXP(160);memory('Brenn found your name in the ledger before the road brought you to Ashmere.');questNote('The Bell That Rang Once: Complete.');addLog('Quest complete: The Bell That Rang Once.','story')}else addLog('You do not have a Bell Fragment yet.','danger');people()}],['Ask about old accounts',()=>{memory('Some Ledger accounts belong to heroes who no longer exist.');people()}]]},sella:{name:'Sella of the Post',place:'The Trading Post',role:'Trader',text:'Everything has a value. The trick is knowing when not to sell it.',topics:[['Ask about prices',()=>{addLog('Sella marks useful goods: ore, gems, tablets, hides, and Magic Orbs.','story');people()}],['Ask about the roads',()=>{memory('Sella says the Old Road pays less but lies less.');people()}]]},oric:{name:'Captain Oric',place:'Ashmere Gate',role:'Guard Captain',text:'If something watches you in a fight, watch it back. Intent saves lives.',topics:[['Combat lesson',()=>{memory('Oric taught you to read enemy intent and guard before heavy strikes.');addTrait('Trained');people()}],['Ask about the Keep',()=>{memory('Oric says The Hollow Keep is not sealed to keep people out. It is sealed to keep the old rules in.');people()}]]},nim:{name:'Nim',place:'Everywhere and Nowhere',role:'Roadchild',text:'I remember version numbers. Adults hate when I do that.',topics:[['Ask what Nim remembers',()=>{memory('Nim remembers a lost holiday event that may return one day.');people()}],['Give Nim 20 gold',()=>{if(player.gold>=20){player.gold-=20;player.momentum=clamp(player.momentum+1,0,5);addLog('Nim buys a sweetroll and gives you a strange thumbs-up. Momentum +1.','story')}else addLog('You do not have 20 gold.','danger');people()}]]}};
    function people(){let html=`<pre class="ascii">${ascii.npc}</pre><div class="list">${Object.entries(npcs).map(([id,n])=>`<button class="npc-card" data-npc="${id}"><h3>${n.name}</h3><p>${n.role} - ${n.place}</p></button>`).join('')}</div>`;layout('Ashmere','People of Ashmere','The town finally has voices. Talk to people to unlock quests, rumors, and memories.',[{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-npc]').forEach(b=>b.onclick=()=>talk(b.dataset.npc))}
    function talk(id){let n=npcs[id];let html=`<pre class="ascii">${ascii.npc}</pre><div class="dialogue"><strong>${n.name}:</strong><p>${n.text}</p></div><div class="list">${n.topics.map((t,i)=>`<button class="shop" data-topic="${i}"><h3>${t[0]}</h3><p>Talk with ${n.name}.</p></button>`).join('')}</div>`;layout(n.place,n.name,`${n.role}`,[{label:'Back to People',fn:people},{label:'Back to Ashmere',fn:menu}],html);n.topics.forEach((t,i)=>document.querySelector(`[data-topic="${i}"]`).onclick=t[1])}
    const routes=[{name:'Old Road',risk:1,unlock:()=>true,desc:'Safer road. More travelers, more small choices.'},{name:'Greenwild Edge',risk:2,unlock:()=>player.stats.checksPassed>=2,desc:'Trees crowd the path. Better gathering, more beasts.'},{name:'Ruined Camps',risk:2,unlock:()=>player.stats.monstersDefeated>=2,desc:'Old fires and abandoned packs. Good loot, some traps.'},{name:'Static Scar',risk:3,unlock:()=>player.flags.bellQuestStarted,desc:'A broken place where the Lost Build leaks through.'},{name:'Hollow Approach',risk:4,unlock:()=>player.level>=5,desc:'The road toward The Hollow Keep.'}];
    const events=[['Ruined Campsite','road','A half-buried chest sits beside cold ashes.',[['Open it carefully','thieving',11,()=>gainItem('gem',1),()=>damage(10,25)],['Search first','survival',10,()=>{gainItem('food',2);gainGold(35)},()=>gainItem('fur',1)],['Force it open','strength',13,()=>{gainGold(120);gainItem('ore',2)},()=>damage(18,45)]]],['Ironwood Tree','commons','A stubborn ironwood tree leans over the path.',[['Chop carefully','survival',9,()=>trainSkillCheck('Woodcutting',2),()=>trainSkillCheck('Woodcutting',1)],['Swing hard','strength',13,()=>{trainSkillCheck('Woodcutting',3);gainItem('log',3)},()=>damage(8,22)],['Gather branches','survival',7,()=>{gainItem('log',2);trainSkillCheck('Woodcutting',1)},()=>gainItem('log',1)]]],['Dark Stream','road','A stream cuts across the road, black beneath the reeds.',[['Cast near reeds','survival',9,()=>{gainItem('rfood',2);trainSkillCheck('Fishing',2)},()=>gainItem('bait',1)],['Cast deep','survival',13,()=>{gainItem('rfood',4);gainItem('gem',1);trainSkillCheck('Fishing',3)},()=>startBattle(true)],['Search the bank','luck',10,()=>{gainItem('bait',5);gainGold(25)},()=>gainItem('bait',1)]]],['Bell Shard','bell','You find a cold metal shard humming beneath the road dust.',[['Lift it carefully','lore',10,()=>{player.inventory.bellFragment++;player.flags.bellRoadSearched=true;memory('The Bell Fragment rang without moving.');questNote('Bring the Bell Fragment to Brenn in The Ledger Hall.')},()=>damage(5,18)],['Listen to it','magic',12,()=>{player.inventory.bellFragment++;player.flags.bellRoadSearched=true;memory('The bell rang before you woke. It may have called your save into the world.')},()=>memory('The shard whispers, but you cannot understand it yet.')],['Leave it alone','survival',6,()=>addTrait('Cautious'),()=>null]]],['Old Signpost','road','A broken sign lists names the world no longer uses.',[['Study the old names','lore',10,()=>memory('The old world once answered to borrowed names before Eldermere took shape.'),()=>memory('The sign hurts to read.')],['Take a splinter','luck',12,()=>{gainItem('log',1);memory('A splinter from the first sign of Ashmere.')},()=>gainItem('log',1)],['Move on quietly','survival',6,()=>heal(10,25),()=>null]]],['Roadside Ambush','goblin','Something moves behind the stones.',[['Stand and fight','strength',8,()=>startBattle(true),()=>startBattle(true)],['Sneak around','agility',12,()=>{gainGold(60);addTrait('Cautious')},()=>startBattle(true)],['Call out','lore',13,()=>{memory('Not every monster chooses to be part of the encounter table.');gainItem('gmail',1)},()=>startBattle(true)]]],['Nim on the Milestone','npc','Nim sits on a milestone, kicking both feet like the road is harmless.',[['Ask for advice','luck',8,()=>memory('Nim says rare events happen more often when you are almost out of safe choices.'),()=>addLog('Nim shrugs. “Bad roll.”')],['Share food','survival',8,()=>{if(player.inventory.food>0){player.inventory.food--;player.momentum=clamp(player.momentum+2,0,5);addLog('Nim shares a rumor. Momentum +2.','story')}},()=>null],['Walk away','survival',5,()=>addTrait('Focused'),()=>null]]]];
    function exploreStart(){explore={danger:0,steps:0,route:null};let rs=routes.filter(r=>r.unlock());let html=`<pre class="ascii">${ascii.road}</pre><div class="list">${rs.map((r,i)=>`<button class="event-card" data-route="${i}"><h3>${r.name}</h3><p>${r.desc}</p><p class="small">Starting risk: ${r.risk}</p></button>`).join('')}</div>`;layout('Ashmere Gate','Choose a Route','Routes unlock through quests, checks, and level progress.',[{label:'Return to Ashmere',fn:menu}],html);document.querySelectorAll('[data-route]').forEach(b=>b.onclick=()=>{explore.route=rs[+b.dataset.route];explore.danger=explore.route.risk;exploreEvent()})}
    function dangerPips(){let p='';for(let i=1;i<=6;i++)p+=`<span class="pip ${i<=explore.danger?(explore.danger>=5?'bad':'on'):''}"></span>`;return`<div class="danger-meter">${p}</div>`}
    function exploreEvent(){explore.steps++;if(explore.danger>=6)return forcedEvent();let pool=events.filter(e=>e[0]!=='Bell Shard'||player.flags.bellQuestStarted&&!player.flags.bellRoadSearched);lastEvent=pool[rand(0,pool.length-1)];let html=`<pre class="ascii">${ascii[lastEvent[1]]||ascii.road}</pre><div class="event-card" style="cursor:default"><h3>${lastEvent[0]}</h3><p>${lastEvent[2]}</p><p class="small">Route: ${explore.route.name}</p>${dangerPips()}</div><div class="choice-row">${lastEvent[3].map((c,i)=>`<button class="shop" data-choice="${i}"><h3>${c[0]}</h3><p>Roll: ${c[1]} check</p></button>`).join('')}</div>`;layout('Roads Beyond Ashmere','Exploration Event','',explore.danger>=3?[{label:'Make Camp',fn:camp},{label:'Return to Ashmere',fn:returnTown}]:[{label:'Return to Ashmere',fn:returnTown}],html);document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>resolveChoice(+b.dataset.choice))}
    function resolveChoice(i){let [label,skill,dc,success,fail]=lastEvent[3][i];addLog('Choice: '+label+'.');let r=d20(skill,dc+Math.max(0,explore.danger-2));r.ok?success():fail();explore.danger+=rand(explore.route.name==='Old Road'?0:1,2);save();afterEvent()}
    function afterEvent(){layout('Roads Beyond Ashmere','The Road Continues',`Danger Level: ${explore.danger}/6\n\nThe road shifts. You can push forward, camp, or return to Ashmere.`,[{label:'Continue Exploring',className:'primary',fn:exploreEvent},{label:'Make Camp',fn:camp},{label:'Return to Ashmere',fn:returnTown}],`<pre class="ascii">${ascii.road}</pre>${dangerPips()}`)}
    function camp(){let r=d20('survival',9+Math.max(0,explore.danger-2));if(r.ok){heal(20,55);explore.danger=Math.max(1,explore.danger-2);addLog('Camp made safely. Danger falls.','story')}else{addLog('The campfire draws attention.','danger');explore.danger++;if(rand(1,2)===1)return startBattle(true)}save();afterEvent()}function forcedEvent(){addLog('The road becomes too dangerous to ignore.','danger');startBattle(true)}function returnTown(){player.hp=clamp(player.hp,1,player.maxHp);addLog('You return to Ashmere with what you found.','story');explore=null;save();menu()}
    function startBattle(fromExplore=false){let t=enemies[rand(0,enemies.length-1)],scale=Math.max(0,player.level-1)+(explore?explore.danger*10:0);enemy={...t,level:rand(Math.max(1,player.level-1),player.level+Math.max(1,Math.ceil((explore?.danger||1)/2))),hp:rand(t.hp[0]+scale,t.hp[1]+scale),maxHp:0,fromExplore,intent:t.intent[rand(0,t.intent.length-1)]};enemy.maxHp=enemy.hp;guarded=false;addLog(`You encounter a level ${enemy.level} ${enemy.name}.`);battle()}
    function battle(){let ep=clamp(enemy.hp/enemy.maxHp*100,0,100),hp=clamp(player.hp/player.maxHp*100,0,100);let html=`<div class="battle"><div class="enemy"><div><div class="glyph">${enemy.glyph}</div><h2 class="red">${enemy.name}</h2><div class="muted">Level ${enemy.level}</div><div class="bar red" style="width:min(360px,72vw);margin:14px auto 0"><span style="width:${ep}%"></span></div><p class="small">${enemy.hp}/${enemy.maxHp} HP</p><p class="small gold">Intent: ${enemy.intent}</p></div></div><div class="stack"><div class="stat"><span class="label">Your Health</span><span class="num">${player.hp}/${player.maxHp}</span><div class="bar red"><span style="width:${hp}%"></span></div></div><div class="stat"><span class="label">Momentum</span><span class="num purple">${player.momentum}/5</span><div class="bar gold"><span style="width:${player.momentum*20}%"></span></div></div><div class="stat"><span class="label">Weapon</span><span class="num gold">${weapon().name}</span><p class="small">Attack 1-${weapon().attack}</p></div><button class="btn primary" id="atk">Attack</button><button class="btn" id="guard">Guard</button><button class="btn" id="classMove">${classes[player.className].move} ${player.momentum>=2?'':'(2 Momentum)'}</button><button class="btn" id="inv">Battle Inventory</button>${enemy.name==='Lacoyx'?'':`<button class="btn" id="flee">Flee</button>`}</div></div>`;layout(enemy.name==='Lacoyx'?'The Hollow Keep':'Road Encounter','Battle','',[],html);document.getElementById('atk').onclick=attack;document.getElementById('guard').onclick=guard;document.getElementById('classMove').onclick=classMove;document.getElementById('inv').onclick=battleInv;let f=document.getElementById('flee');if(f)f.onclick=()=>{addLog('You flee back toward Ashmere.');enemy.fromExplore?returnTown():menu()}}
    function attack(){let dmg=Math.min(enemy.hp,rand(1,weapon().attack));enemy.hp-=dmg;player.momentum=clamp(player.momentum+1,0,5);let xp=Math.floor(dmg*.8);gainXP(xp);addLog(`You deal ${dmg} damage and gain ${xp} EXP.`);if(enemy.hp<=0)return win();enemyAttack()}
    function guard(){guarded=true;player.momentum=clamp(player.momentum+1,0,5);addLog('You guard and read the enemy intent. Momentum +1.','story');enemyAttack()}
    function classMove(){if(player.momentum<2){addLog('Not enough Momentum.','danger');return battle()}player.momentum-=2;let dmg=0;if(player.className==='Warrior'){dmg=Math.floor(rand(weapon().attack*.7,weapon().attack*1.5));addLog('You cleave through the enemy stance.','story')}else if(player.className==='Ranger'){dmg=Math.floor(rand(weapon().attack*.45,weapon().attack));enemy.maxDamage=Math.max(8,enemy.maxDamage-12);addLog('Your trap weakens the next attacks.','story')}else if(player.className==='Mage'){if(player.inventory.rtab>0)player.inventory.rtab--;dmg=Math.floor(rand(weapon().attack*.6,weapon().attack*1.35));addLog('Rune Bolt burns through the air.','story')}else if(player.className==='Thief'){dmg=Math.floor(rand(weapon().attack*.4,weapon().attack));gainGold(rand(15,65));addLog('You swipe something useful mid-fight.','story')}else if(player.className==='Skiller'){dmg=Math.floor(rand(20,weapon().attack));heal(10,30);addLog('You improvise with road tools and patch yourself up.','story')}else{dmg=Math.floor(rand(weapon().attack*.5,weapon().attack*1.2));addLog('Luck bends your strike.','story')}enemy.hp-=Math.min(enemy.hp,dmg);gainXP(Math.floor(dmg*.9));if(enemy.hp<=0)return win();enemyAttack()}
    function enemyAttack(){let dmg=Math.max(0,rand(1,enemy.maxDamage)-rand(0,armor().defense));if(guarded){dmg=Math.floor(dmg*.45);guarded=false}player.hp-=dmg;enemy.intent=enemy.intent?enemy.intent:enemy.intent;addLog(`${enemy.name} attacks and deals ${dmg} damage.`);enemy.intent=enemies.find(e=>e.name===enemy.name)?.intent[rand(0,enemies.find(e=>e.name===enemy.name).intent.length-1)]||'watches you';if(player.hp<=0)return die();save();battle()}
    function win(){let[k,a,n]=enemy.drop;gainItem(k,a,false);player.stats.monstersDefeated++;player.momentum=clamp(player.momentum+1,0,5);addLog(`You defeated ${enemy.name} and received ${a} ${n}.`,'story');if(enemy.name==='Lacoyx'){player.flags.lacoyxDefeated=true;player.inventory.codeFragment++;memory('Lacoyx guarded a Code Fragment from the Lost Build.')}player.hp=clamp(player.hp+Math.floor(player.maxHp*.35),1,player.maxHp);save();enemy.fromExplore?afterEvent():menu()}function die(){player.stats.timesDied++;player.hp=player.maxHp;player.momentum=0;explore=null;addLog('You died. Ashmere drags your save back from the dark.','danger');save();menu()}
    function battleInv(){layout('Battle Inventory','Use Supplies',`Food: ${player.inventory.food}\nPotions: ${player.inventory.potion}\n\nUsing supplies gives the enemy a turn afterward.`,[{label:'Eat Food',fn:()=>useHeal('food',45)},{label:'Drink Potion',className:'primary',fn:()=>useHeal('potion',95)},{label:'Change Weapon',fn:()=>equip('weapon',true)},{label:'Change Armor',fn:()=>equip('armor',true)},{label:'Back',fn:battle}])}
    function useHeal(k,max){if(player.inventory[k]<=0){addLog(`No ${itemNames[k]} left.`);return battleInv()}player.inventory[k]--;heal(12,max);enemyAttack()}function gainXP(a){if(player.level>=37)return;player.xp+=a;player.xpUntil-=a;while(player.xpUntil<=0&&player.level<37){player.level++;player.xpBase+=420;player.xpUntil+=player.xpBase;player.maxHp+=player.className==='Warrior'?30:23;player.hp=player.maxHp;addLog(`Level up! You are now level ${player.level}.`,'story');if(player.level>=5)player.flags.strongholdRumor=true}}
    function gainItem(k,a,show=true){player.inventory[k]=(player.inventory[k]||0)+a;if(show)addLog(`Gained ${a} ${itemNames[k]||k}.`)}function gainGold(a){player.gold+=a;addLog(`Gained ${a} gold.`)}function damage(a,b){let d=rand(a,b);player.hp-=d;addLog(`You take ${d} damage.`,'danger');if(player.hp<=0)die()}function heal(a,b){let h=rand(a,b);player.hp=clamp(player.hp+h,1,player.maxHp);addLog(`Healed ${h} HP.`)}
    function trainSkillCheck(name,mult=1){let s=player.skills[name],amount=s.gain*mult;s.xp+=amount;s.xpLeft-=amount;player.mastery[name]=clamp((player.mastery[name]||0)+mult,0,100);addLog(`${name} gains ${amount} XP and ${mult}% mastery.`);if(s.xpLeft<=0){let check=d20(s.check,9+s.level);if(check.ok){s.level++;s.xpLeft=80+s.level*32;addLog(`${name} leveled up to ${s.level}.`,'story')}else{s.xpLeft=25;addLog(`${name} is close to leveling, but the check failed. Try again.`,'danger')}}}
    function commons(){let html=`<pre class="ascii">${ascii.commons}</pre><div class="list">${Object.entries(player.skills).map(([n,s])=>`<button class="skill" data-skill="${n}"><h3>${n} - Level ${s.level}</h3><p>XP: ${s.xp} / Left: ${s.xpLeft}. Mastery: ${player.mastery[n]||0}%.</p></button>`).join('')}</div>`;layout('The Commons','Skill Training','Training now uses checks and mastery.',[{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-skill]').forEach(b=>b.onclick=()=>skillEvent(b.dataset.skill))}
    function skillEvent(n){let map={Woodcutting:['survival',()=>gainItem('log',2)],Fishing:['survival',()=>gainItem('rfood',2)],Mining:['strength',()=>gainItem('ore',2)],Cooking:['craft',()=>{if(player.inventory.rfood>0){player.inventory.rfood--;gainItem('food',2)}else gainItem('food',1)}],Smithing:['craft',()=>{if(player.inventory.ore>=2){player.inventory.ore-=2;gainItem('ingot',1)}else gainItem('ore',1)}],Thieving:['thieving',()=>gainGold(rand(20,75))]};let[sk,reward]=map[n],r=d20(sk,8+player.skills[n].level);if(r.ok){reward();trainSkillCheck(n,2)}else trainSkillCheck(n,1);save();commons()}
    function sheet(){let mastery=Object.keys(player.skills).map(k=>`- ${k}: ${player.mastery[k]||0}%`).join('\n');layout('Character Sheet','Character Sheet',`Name: ${player.username}\nOrigin: ${player.origin}\nClass: ${player.className}\nKeepsake: ${player.keepsake}\nWorld: Eldermere\nTown: Ashmere\nTraits: ${player.traits.join(', ')||'None yet'}\n\nMastery:\n${mastery}\n\nQuest Log:\n- ${(player.questLog.length?player.questLog:['No quests recorded yet.']).join('\n- ')}\n\nMemories:\n- ${player.memories.join('\n- ')}`,[{label:'Inventory',fn:inventory},{label:'Back to Ashmere',fn:menu}],`<pre class="ascii">${ascii.ashmere}</pre>`)}
    function inventory(){layout('Inventory','Inventory','', [{label:'Change Weapon',fn:()=>equip('weapon',false)},{label:'Change Armor',fn:()=>equip('armor',false)},{label:'Back',fn:menu}],`<div class="stat-grid">${Object.entries(player.inventory).map(([k,v])=>`<div class="stat"><span class="label">${itemNames[k]||k}</span><span class="num">${v}</span></div>`).join('')}</div>`)}
    function equip(type,inBattle){let list=type==='weapon'?weapons:armors,owned=type==='weapon'?player.ownedWeapons:player.ownedArmor;let html=`<div class="list">${list.filter(x=>owned[x.id]).map(x=>`<button class="shop" data-equip="${x.id}"><h3>${x.name} ${player[type]===x.id?'[equipped]':''}</h3><p>${type==='weapon'?`Attack 1-${x.attack}`:`Block 0-${x.defense}`}. Owned: ${owned[x.id]}</p></button>`).join('')}</div>`;layout(type==='weapon'?'Weapon Select':'Armor Select','Choose Equipment','', [{label:'Back',fn:inBattle?battleInv:inventory}],html);document.querySelectorAll('[data-equip]').forEach(b=>b.onclick=()=>{player[type]=b.dataset.equip;addLog(`Equipped ${list.find(x=>x.id===b.dataset.equip).name}.`);save();inBattle?battleInv():inventory()})}
    function shop(title,items){let html=`<div class="list">${items.map(x=>`<button class="shop" data-buy="${x.id}"><h3>${x.name}</h3><p>${x.attack?`Attack 1-${x.attack}`:`Block 0-${x.defense}`} / Cost ${x.cost} ${x.currency==='morb'?'Magic Orbs':'gold'} / Level ${x.level}</p></button>`).join('')}</div>`;layout(title,title,'', [{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>buy([...weapons,...armors].find(x=>x.id===b.dataset.buy)))}function weaponShop(){shop('Weapon Shop',weapons.filter(w=>w.id!=='hand'&&!w.currency))}function armorShop(){shop('Armor Shop',armors.filter(a=>a.id!=='none'&&!a.currency))}function relicMarket(){shop('The Relic Market',[...weapons,...armors].filter(x=>x.currency==='morb'))}
    function buy(item){let cur=item.currency||'gold';if(player.level<item.level){addLog(`Need level ${item.level}.`,'danger');return menu()}if(cur==='gold'){if(player.gold<item.cost){addLog('Not enough gold.','danger');return menu()}player.gold-=item.cost}else{if(player.inventory[cur]<item.cost){addLog('Not enough Magic Orbs.','danger');return menu()}player.inventory[cur]-=item.cost}if(weapons.some(w=>w.id===item.id))player.ownedWeapons[item.id]=(player.ownedWeapons[item.id]||0)+1;else player.ownedArmor[item.id]=(player.ownedArmor[item.id]||0)+1;addLog(`Bought ${item.name}.`,'story');save();menu()}
    function tradingPost(){let sellables=Object.keys(prices).filter(k=>prices[k]>0&&player.inventory[k]>0);let html=`<pre class="ascii">${ascii.ashmere}</pre><div class="list">${sellables.length?sellables.map(k=>`<button class="shop" data-sell="${k}"><h3>${itemNames[k]} x${player.inventory[k]}</h3><p>Value: ${sellPrice(k)} gold each. Sell all for ${sellPrice(k)*player.inventory[k]} gold.</p></button>`).join(''):'<div class="quest"><h3>Nothing to sell</h3><p>Explore beyond Ashmere to recover drops and resources.</p></div>'}</div>`;layout('Trading Post','Trading Post','Enemy drops finally have a purpose. Sell recovered materials here for gold.',[{label:'Sell All Common Drops',className:'primary',fn:sellAll},{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>sellItem(b.dataset.sell))}function sellPrice(k){return Math.floor(prices[k]*(1+(keepsakes[player.keepsake]?.sellBonus||0)))}function sellItem(k){let q=player.inventory[k];if(q<=0)return tradingPost();let total=sellPrice(k)*q;player.inventory[k]=0;player.gold+=total;addLog(`Sold ${q} ${itemNames[k]} for ${total} gold.`,'story');save();tradingPost()}function sellAll(){Object.keys(prices).forEach(k=>{if(!['morb','codeFragment','bellFragment'].includes(k)&&player.inventory[k]>0){let total=sellPrice(k)*player.inventory[k];player.gold+=total;player.inventory[k]=0}});addLog('Sold all common drops.','story');save();tradingPost()}
    function dealer(){let html=`<pre class="ascii">${ascii.road}</pre><div class="list"><button class="shop" id="rumor"><h3>Buy a Rumor - 75 gold</h3><p>Vask knows old names and bad roads.</p></button><button class="shop" id="mystery"><h3>Risky Trade - 3 Magic Orbs</h3><p>Trade for a random reward.</p></button><button class="shop" id="shady"><h3>Sell Magic Orb at Shady Rate</h3><p>Sell 1 Magic Orb for ${Math.floor(prices.morb*1.25)} gold.</p></button></div>`;layout('Backroad','Vask, The Backroad Dealer',`Vask: I do not buy junk. I buy things the world forgot it owned.`,[{label:'Back to Ashmere',fn:menu}],html);document.getElementById('rumor').onclick=()=>{if(player.gold<75){addLog('Not enough gold.','danger');return dealer()}player.gold-=75;memory(['The Ledger Hall stores records older than Ashmere.','Lacoyx remembers the old labels for every item.','Some roads do not lead to places. They lead to versions.'][rand(0,2)]);save();dealer()};document.getElementById('mystery').onclick=()=>{if(player.inventory.morb<3){addLog('Not enough Magic Orbs.','danger');return dealer()}player.inventory.morb-=3;let r=rand(1,4);if(r===1)gainItem('gem',4);if(r===2)gainGold(2000);if(r===3)gainItem('potion',5);if(r===4)damage(5,25);save();dealer()};document.getElementById('shady').onclick=()=>{if(player.inventory.morb<1){addLog('No Magic Orbs.','danger');return dealer()}player.inventory.morb--;gainGold(Math.floor(prices.morb*1.25));save();dealer()}}
    function ledger(){let html=`<pre class="ascii">${ascii.ledger}</pre><div class="list">${player.bank.map((g,i)=>`<div class="quest"><h3>Ledger Account ${i+1}</h3><p>Stored gold: <span class="gold">${g}</span></p><div class="actions"><button class="btn" data-dep="${i}">Deposit All</button><button class="btn" data-wit="${i}">Withdraw All</button></div></div>`).join('')}</div>`;layout('The Ledger Hall','The Ledger Hall','A vault of gold, records, and old save logic.',[{label:'Speak with Brenn',fn:()=>talk('brenn')},{label:'Back',fn:menu}],html);document.querySelectorAll('[data-dep]').forEach(b=>b.onclick=()=>{let i=+b.dataset.dep,room=1e9-player.bank[i],amt=Math.min(room,player.gold);player.bank[i]+=amt;player.gold-=amt;addLog(`Deposited ${amt} gold.`);save();ledger()});document.querySelectorAll('[data-wit]').forEach(b=>b.onclick=()=>{let i=+b.dataset.wit,amt=player.bank[i];player.gold+=amt;player.bank[i]=0;addLog(`Withdrew ${amt} gold.`);save();ledger()})}
    function archive(){let html=`<div class="list"><div class="quest"><h3>The Bell That Rang Once</h3><p>${player.flags.bellQuestComplete?'Complete':'Active'} - Follow the bell from road to ledger.</p></div><div class="quest"><h3>The Hollow Keep</h3><p>Reach level 5 and face Lacoyx.</p></div><div class="quest"><h3>Recovered Memories</h3><p>${player.memories.length} memories recovered.</p></div></div>`;layout('The Archive Hall','The Archive Hall','The Archive Hall remembers quests from a world that rolled back.',[{label:'Speak with Mara',fn:()=>talk('mara')},{label:'Read Memories',fn:()=>layout('Archive Hall','Recovered Memories',player.memories.map(m=>'- '+m).join('\n'),[{label:'Back',fn:archive},{label:'Ashmere',fn:menu}])},{label:'Back',fn:menu}],html)}
    function keepWarn(){let ok=player.level>=5||player.flags.strongholdRumor;layout('The Hollow Keep','The Hollow Keep',`${ok?'The gate recognizes your recovered level.':'The gate is sealed. Reach level 5 first.'}\n\nLacoyx waits below. You cannot flee from him.`,[...(ok?[{label:'Enter The Hollow Keep',className:'primary',fn:boss}]:[]),{label:'Back',fn:menu}],`<pre class="ascii">${ascii.keep}</pre>`)}function boss(){player.stats.strongholdRuns++;enemy={name:'Lacoyx',glyph:'♛',level:741,hp:2780,maxHp:2780,maxDamage:520,drop:['morb',25,'Magic Orbs'],fromExplore:false,intent:'remembers your previous build'};addLog('Lacoyx: You gave Ashmere a voice. It will scream eventually.','danger');battle()}
    title();
  </script>
