<style>
:root{--bg:#060807;--soft:#0d1813;--panel:rgba(10,18,15,.95);--panel2:rgba(5,10,8,.62);--border:rgba(132,255,178,.24);--text:#eaffef;--muted:#93b7a3;--accent:#7dffad;--gold:#ffd369;--red:#ff6b6b;--blue:#8dd7ff;--purple:#c08cff;--shadow:rgba(0,0,0,.42)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;color:var(--text);font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(125,255,173,.12),transparent 28%),radial-gradient(circle at 85% 20%,rgba(255,211,105,.08),transparent 24%),linear-gradient(180deg,var(--soft),var(--bg));overflow-x:hidden}button,input{font:inherit}.shell{width:min(1320px,96vw);margin:18px auto;display:flex;flex-direction:column;gap:14px}.panel,.topbar,.title-card{border:1px solid var(--border);background:linear-gradient(180deg,rgba(16,30,24,.96),rgba(6,10,9,.94));box-shadow:0 18px 50px var(--shadow),inset 0 0 35px rgba(125,255,173,.035);border-radius:18px}.topbar{padding:14px 18px;display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:12px;align-items:center}.brand h1{margin:0;color:var(--accent);font-size:clamp(2rem,5vw,4.5rem);line-height:.88;letter-spacing:.16em;text-shadow:0 0 18px rgba(125,255,173,.35)}.brand .sub{margin-top:7px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-size:.78rem}.layout{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(310px,.8fr);gap:14px}.panel{padding:16px}.panel-head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid rgba(132,255,178,.13)}.panel-head h2,.panel-head h3{margin:0;color:var(--accent)}.panel-head p{margin:4px 0 0;color:var(--muted)}.meta-grid,.stat-grid,.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.box,.stat,.card,.quest,.shop,.npc-card,.event-card{background:var(--panel2);border:1px solid rgba(132,255,178,.14);border-radius:14px;padding:12px}.label{display:block;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:.72rem;margin-bottom:5px}.value,.gold{color:var(--gold);font-weight:800}.muted{color:var(--muted)}.red{color:var(--red)}.green{color:var(--accent)}.purple{color:var(--purple)}.num{font-weight:900}.bar{height:9px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin-top:8px;border:1px solid rgba(255,255,255,.07)}.bar>span{display:block;height:100%;background:linear-gradient(90deg,#46c77a,#7dffad);border-radius:inherit}.bar.red>span{background:linear-gradient(90deg,#b52424,#ff6b6b)}.bar.gold>span{background:linear-gradient(90deg,#a96b12,#ffd369)}.stack{display:flex;flex-direction:column;gap:14px}.log{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow:auto}.log-entry{background:rgba(255,255,255,.035);border-left:3px solid rgba(125,255,173,.44);border-radius:10px;padding:10px 12px;color:#d9f1e2;line-height:1.35}.log-entry.story{border-left-color:var(--gold);color:#fff0c2}.log-entry.danger{border-left-color:var(--red);color:#ffd3d3}.text{color:#e7f5ec;line-height:1.65;font-size:1.02rem;white-space:pre-wrap}.ascii{font-family:Consolas,"Courier New",monospace;color:var(--accent);background:rgba(0,0,0,.25);border:1px solid rgba(125,255,173,.18);border-radius:14px;padding:14px;margin-bottom:14px;overflow:auto;line-height:1.15;text-shadow:0 0 10px rgba(125,255,173,.22)}.list{display:grid;gap:10px}.card,.shop,.npc-card,.event-card{width:100%;text-align:left;color:var(--text);cursor:pointer;transition:.16s ease}.card h3,.shop h3,.npc-card h3,.event-card h3,.quest h3{margin:0 0 6px;color:var(--gold)}.card p,.shop p,.npc-card p,.event-card p,.quest p{margin:0;color:var(--muted);line-height:1.4}.btn{border:1px solid rgba(132,255,178,.28);background:linear-gradient(180deg,rgba(31,54,44,.96),rgba(10,18,15,.96));color:var(--text);min-height:48px;border-radius:12px;padding:12px 15px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;transition:.16s ease}.btn:hover,.card:hover,.shop:hover,.npc-card:hover,.event-card:hover{transform:translateY(-2px);border-color:rgba(255,211,105,.55);box-shadow:0 0 22px rgba(255,211,105,.11),0 14px 24px rgba(0,0,0,.2)}.btn.primary{border-color:rgba(255,211,105,.46);color:#231a04;background:linear-gradient(180deg,#ffe29a,#d69f32);font-weight:900}.btn.danger{border-color:rgba(255,107,107,.5);color:var(--red);background:rgba(45,9,9,.6)}.actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}.title-wrap{min-height:100svh;display:grid;place-items:center;padding:18px}.title-card{width:min(1000px,100%);padding:clamp(24px,5vw,56px)}.kicker{color:var(--gold);text-transform:uppercase;letter-spacing:.25em;margin:18px 0 8px}.game-title{margin:0;color:var(--accent);font-size:clamp(3.2rem,13vw,9.5rem);letter-spacing:.18em;line-height:.85;text-shadow:0 0 24px rgba(125,255,173,.42),0 6px 0 rgba(0,0,0,.35)}.title-lore{max-width:780px;color:#d7efe0;font-size:1.05rem;line-height:1.7;margin:18px 0 26px}input{background:rgba(0,0,0,.5);color:var(--text);border:1px solid rgba(132,255,178,.28);border-radius:12px;padding:14px;min-width:min(330px,100%);outline:none}.enemy{min-height:300px;display:grid;place-items:center;text-align:center;background:radial-gradient(circle at center,rgba(255,107,107,.11),transparent 40%),rgba(0,0,0,.24);border:1px solid rgba(255,107,107,.22);border-radius:18px;padding:18px}.glyph{font-size:clamp(4rem,10vw,8rem);filter:drop-shadow(0 0 18px rgba(255,107,107,.38))}.danger-meter{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:8px}.pip{height:10px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08)}.pip.on{background:linear-gradient(90deg,#a96b12,#ffd369)}.pip.bad{background:linear-gradient(90deg,#b52424,#ff6b6b)}.tag{display:inline-block;border:1px solid rgba(132,255,178,.22);border-radius:999px;padding:3px 8px;color:var(--accent);font-size:.78rem;margin-right:6px;margin-top:6px}.quest-step{border:1px solid rgba(255,211,105,.24);background:rgba(255,211,105,.06);border-radius:14px;padding:12px;margin-bottom:12px}.small{font-size:.9rem;color:var(--muted)}
@media(max-width:980px){.topbar,.layout{grid-template-columns:1fr}.meta-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:720px){body{font-size:16px}.shell{width:100%;margin:0;padding:8px 8px calc(84px + env(safe-area-inset-bottom));gap:8px}.topbar{position:sticky;top:0;z-index:10;padding:10px;border-radius:0 0 14px 14px;grid-template-columns:1fr;background:rgba(6,10,9,.96)}.brand h1{font-size:2rem;letter-spacing:.10em}.brand .sub{font-size:.68rem}.box{padding:8px}.panel{padding:12px;border-radius:14px}.grid,.stat-grid{grid-template-columns:1fr}.ascii{font-size:clamp(.58rem,2.45vw,.8rem);padding:10px;max-height:150px;white-space:pre}.title-wrap{padding:8px;align-items:start}.title-card{padding:18px}.game-title{font-size:clamp(3.2rem,18vw,5.2rem);letter-spacing:.08em}.actions{flex-direction:column;align-items:stretch;position:sticky;bottom:0;z-index:9;background:linear-gradient(180deg,rgba(6,8,7,0),rgba(6,8,7,.96) 22%);padding:12px 0 calc(8px + env(safe-area-inset-bottom))}.btn{width:100%;min-height:52px}.stack .panel:not(:first-child){display:none}.enemy{min-height:220px}.glyph{font-size:4.2rem}}
</style>

<body><div id="root"></div><script>
const VERSION='v0.5.1';
const SAVE_KEY='legend-recovered-build-v051';
const OLD=['legend-recovered-build-v05','legend-recovered-build-v041','legend-recovered-build-v04','legend-recovered-build-v03','legend-recovered-build-v02'];
const root=document.getElementById('root');
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const esc=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const classes={Adventurer:{hp:110,gold:120,mod:{survival:1,luck:1},move:'Lucky Strike',desc:'Balanced survivor. Good for a first run.'},Warrior:{hp:140,gold:90,mod:{strength:3},move:'Cleave',desc:'High HP and better force checks.'},Ranger:{hp:115,gold:100,mod:{survival:3,agility:1},move:'Trap Shot',desc:'Better road sense, scouting, and fleeing.'},Mage:{hp:90,gold:130,mod:{magic:3,lore:1},move:'Rune Bolt',desc:'Runic power and better strange-event checks.'},Thief:{hp:98,gold:160,mod:{thieving:3,agility:1},move:'Swipe',desc:'Better stealing, locks, and risky rewards.'},Skiller:{hp:95,gold:125,mod:{craft:2,survival:1},move:'Improvised Tool',desc:'Better gathering, crafting, and non-combat play.'}};
const origins={"Lost Squire":{bonus:{strength:1},text:'You once carried a blade for someone braver than you.'},"Runaway Apprentice":{bonus:{magic:1,lore:1},text:'You fled a teacher who knew too much about the Lost Build.'},"Debt-Bound Thief":{bonus:{thieving:1},gold:40,text:'Someone in Ashmere thinks you still owe them.'},"Archivist's Child":{bonus:{lore:2},text:'You learned to read records before you learned to swing a weapon.'},"Wandering Cook":{items:{food:3},bonus:{survival:1},text:'You know a road meal can save a life.'},"Failed Monster Hunter":{bonus:{strength:1,survival:1},text:'The last hunt went badly. You survived anyway.'}};
const keepsakes={"Rusty Charm":{bonus:{luck:2},text:'A charm warm with impossible luck.'},"Old Map":{bonus:{survival:2},text:'The ink shifts when roads change.'},"Bent Coin":{sellBonus:.12,text:'A coin no shopkeeper likes to refuse.'},"Cracked Tablet":{items:{rtab:2},bonus:{magic:1},text:'A runic shard from a lesson you forgot.'},"Dull Knife":{bonus:{thieving:2},text:'Bad steel, good enough for a lock.'},"Cooked Ration":{items:{food:5},text:'A small meal from before the road collapsed.'}};
const weapons=[['hand','Your Hand',8,20,0,1],['woodenSword','Wooden Sword',14,34,65,1],['stoneSword','Stone Sword',20,48,140,1],['bronzeSword','Bronze Sword',28,62,280,2],['ironSword','Iron Sword',36,82,650,4],['steelSword','Steel Sword',48,108,1400,7],['crystalSword','Crystal Sword',64,136,4200,12],['runicSword','Runic Sword',82,170,9000,18]].map(x=>({id:x[0],name:x[1],min:x[2],max:x[3],cost:x[4],level:x[5]}));
const armors=[['none','No Armor',0,0,1],['clothArmor','Cloth Armor',10,80,1],['chainArmor','Chain Armor',22,180,1],['bronzeArmor','Bronze Armor',42,380,2],['ironArmor','Iron Armor',68,850,4],['steelArmor','Steel Armor',105,1800,7]].map(x=>({id:x[0],name:x[1],defense:x[2],cost:x[3],level:x[4]}));
const enemies=[{name:'Goblin',glyph:'👺',maxDamage:22,hp:[50,85],drop:['gmail',1,'Goblin Mail'],trait:'Sneaky',intent:['eyes your coin pouch','slashes wildly','looks ready to flee']},{name:'Rat',glyph:'🐀',maxDamage:16,hp:[30,60],drop:['fur',2,'Furs'],trait:'Skittish',intent:['skitters around your boots','bares its teeth','looks for an opening']},{name:'Giant',glyph:'🗿',maxDamage:38,hp:[105,165],drop:['hbone',2,'Huge Bones'],trait:'Heavy',intent:['winds up a heavy blow','stomps the road','raises both fists']},{name:'Mage',glyph:'🧙',maxDamage:68,hp:[110,185],drop:['rtab',2,'Runic Tablets'],trait:'Drain',intent:['chants a cracked spell','lifts a runic tablet','studies your stance']},{name:'Bear',glyph:'🐻',maxDamage:68,hp:[140,215],drop:['fur',4,'Furs'],trait:'Charge',intent:['lowers its head','prepares to charge','sniffs for weakness']},{name:'Rockbeast',glyph:'🪨',maxDamage:88,hp:[175,280],drop:['ore',5,'Ore'],trait:'Stonehide',intent:['hardens its shell','rumbles forward','cracks its stone arms']}];
const itemNames={gmail:'Goblin Mail',hbone:'Huge Bones',rtab:'Runic Tablets',food:'Food',rfood:'Raw Food',bait:'Bait',potion:'Potions',camp:'Camp Supplies',fur:'Furs',gem:'Gemstones',log:'Logs',ore:'Ore',morb:'Magic Orbs',codeFragment:'Code Fragments',bellFragment:'Bell Fragments',roadToken:'Road Tokens'};
const prices={gmail:300,hbone:550,rtab:250,food:100,rfood:60,bait:2,potion:200,camp:90,fur:200,gem:1000,log:275,ore:500,morb:15000,codeFragment:0,bellFragment:0,roadToken:0};
const ascii={title:`        /\\                 /\\\n       /  \\___ LEGEND ____/  \\\n      /_________________________\\\n      |       RECOVERED BUILD    |\n      |__________________________|`,ashmere:`        /\\____ ASHMERE ____/\\\n      /___________________________\\\n      | []   []   []   []   []   |\n      |      THE FIRST TOWN       |\n      |___________________________|`,road:`      ___|___ .   . ___|___\n  ____/   |   \\_____/   |   \\____\n      THE FIRST ROAD`,bell:`            _______\n           / BELL  \\\n          |FRAGMENT|\n          \\_______/`,npc:`        .-\"\"\"-.\n       /  o o  \\\n       |   ^   |\n       |  '-'  |\n       '-------'`,keep:`        ______________________\n       /     THE HOLLOW KEEP    \\\n     /__________________________\\\n        ||  ||  ||  ||  ||`};
let player=null,enemy=null,locationName='Recovered Menu',log=[],explore=null,lastEvent=null,guarded=false;
const weapon=()=>weapons.find(w=>w.id===player.weapon)||weapons[0];
const armor=()=>armors.find(a=>a.id===player.armor)||armors[0];
const mod=s=>((classes[player.className]?.mod?.[s]||0)+(origins[player.origin]?.bonus?.[s]||0)+(keepsakes[player.keepsake]?.bonus?.[s]||0));
function baseSkills(){return{Woodcutting:{level:1,xp:0,xpLeft:80,gain:34,check:'survival'},Cooking:{level:1,xp:0,xpLeft:80,gain:36,check:'craft'},Fishing:{level:1,xp:0,xpLeft:80,gain:30,check:'survival'},Mining:{level:1,xp:0,xpLeft:80,gain:32,check:'strength'},Smithing:{level:1,xp:0,xpLeft:80,gain:35,check:'craft'},Thieving:{level:1,xp:0,xpLeft:80,gain:36,check:'thieving'}}}
function normalize(p){p.origin=p.origin||'Lost Squire';p.keepsake=p.keepsake||'Rusty Charm';p.inventory=p.inventory||{};Object.keys(itemNames).forEach(k=>p.inventory[k]??=0);p.ownedWeapons=p.ownedWeapons||{hand:1};p.ownedArmor=p.ownedArmor||{none:1};p.stats=p.stats||{};Object.assign(p.stats,{monstersDefeated:p.stats.monstersDefeated||0,timesDied:p.stats.timesDied||0,checksPassed:p.stats.checksPassed||0,checksFailed:p.stats.checksFailed||0,oldRoadClears:p.stats.oldRoadClears||0,oldRoadSuccesses:p.stats.oldRoadSuccesses||0});p.flags=p.flags||{};Object.assign(p.flags,{bellQuestStarted:!!p.flags.bellQuestStarted,bellRoadSearched:!!p.flags.bellRoadSearched,bellQuestComplete:!!p.flags.bellQuestComplete,firstRoadComplete:!!p.flags.firstRoadComplete,firstRoadHint:!!p.flags.firstRoadHint});p.skills=p.skills||baseSkills();p.mastery=p.mastery||{};Object.keys(p.skills).forEach(k=>p.mastery[k]??=0);p.memories=p.memories||['You woke beneath a dead lantern outside Ashmere.'];p.questLog=p.questLog||['The Bell That Rang Once: Speak to Mara in The Archive Hall.','The First Road: Explore Old Road and return with 3 Road Tokens.'];p.traits=p.traits||[];p.momentum=p.momentum||0;p.bank=p.bank||[0,0,0,0,0];return p}
function save(){if(player)localStorage.setItem(SAVE_KEY,JSON.stringify(player))}
function load(){let raw=localStorage.getItem(SAVE_KEY)||OLD.map(k=>localStorage.getItem(k)).find(Boolean);if(!raw)return null;try{return normalize(JSON.parse(raw))}catch{return null}}
function addLog(m,t=''){log.unshift({m,t});log=log.slice(0,12)}
function gainItem(k,a,show=true){player.inventory[k]=(player.inventory[k]||0)+a;if(show)addLog(`Gained ${a} ${itemNames[k]||k}.`,'story')}
function gainGold(a){player.gold+=a;addLog(`Gained ${a} gold.`,'story')}
function gainXP(a){if(player.level>=37)return;player.xp+=a;player.xpUntil-=a;while(player.xpUntil<=0&&player.level<37){player.level++;player.xpBase+=420;player.xpUntil+=player.xpBase;player.maxHp+=player.className==='Warrior'?30:23;player.hp=player.maxHp;addLog(`Level up! You are now level ${player.level}.`,'story')}}
function heal(a,b){let h=rand(a,b);player.hp=clamp(player.hp+h,1,player.maxHp);addLog(`Healed ${h} HP.`,'story')}
function damage(a,b){let d=rand(a,b);player.hp-=d;addLog(`You take ${d} damage.`,'danger');if(player.hp<=0)die()}
function memory(m){if(!player.memories.includes(m))player.memories.push(m);addLog('Recovered Memory: '+m,'story')}
function questNote(q){if(!player.questLog.includes(q))player.questLog.push(q)}
function addTrait(t){if(!player.traits.includes(t))player.traits.push(t);addLog('Trait gained: '+t,'story')}
function d20(skill,dc){let roll=rand(1,20),bonus=mod(skill),total=roll+bonus,ok=total>=dc;if(ok){player.stats.checksPassed++;player.momentum=clamp(player.momentum+1,0,5)}else player.stats.checksFailed++;addLog(`${skill} check: d20(${roll}) + ${bonus} = ${total} vs DC ${dc}. ${ok?'Success!':'Failure.'}`,ok?'story':'danger');return{ok,total}}
function newPlayer(username,origin,className,keepsake){let cls=classes[className],org=origins[origin],keep=keepsakes[keepsake],inv={gmail:0,hbone:0,rtab:0,food:2,rfood:0,bait:0,potion:1,camp:1,fur:0,gem:0,log:0,ore:0,morb:0,codeFragment:0,bellFragment:0,roadToken:0};Object.entries(org.items||{}).forEach(([k,v])=>inv[k]+=v);Object.entries(keep.items||{}).forEach(([k,v])=>inv[k]+=v);let ownedWeapons=Object.fromEntries(weapons.map(w=>[w.id,0])),ownedArmor=Object.fromEntries(armors.map(a=>[a.id,0]));ownedWeapons.hand=1;ownedArmor.none=1;let skills=baseSkills();return normalize({username,world:'Eldermere',town:'Ashmere',origin,className,keepsake,level:1,hp:cls.hp,maxHp:cls.hp,xp:0,xpUntil:420,xpBase:420,gold:cls.gold+(org.gold||0),weapon:'hand',armor:'none',ownedWeapons,ownedArmor,inventory:inv,bank:[0,0,0,0,0],skills,mastery:Object.fromEntries(Object.keys(skills).map(k=>[k,0])),stats:{},flags:{},traits:[],momentum:0,questLog:['The Bell That Rang Once: Speak to Mara in The Archive Hall.','The First Road: Explore Old Road and return with 3 Road Tokens.'],memories:['You woke beneath a dead lantern outside Ashmere.',`Origin: ${origin}. ${org.text}`,`Keepsake: ${keepsake}. ${keep.text}`]})}
function title(){player=load();root.innerHTML=`<div class="title-wrap"><section class="title-card"><div><div class="kicker">Recovered Build ${VERSION}</div><pre class="ascii">${ascii.title}</pre><h1 class="game-title">LEGEND</h1><p class="title-lore">First Road Balance: faster Road Token progress, clearer quest pacing, better early-route rewards, and a feedback-ready public playtest loop.</p><div class="actions">${player?`<button class="btn primary" id="continue">Continue as ${esc(player.username)}</button>`:''}<button class="btn" id="new">New Recovered Save</button><a class="btn" href="feedback.html">Playtest Feedback</a><a class="btn" href="blog.html">Devlog</a><a class="btn" href="updates.html">Newsletter</a>${player?`<button class="btn danger" id="delete">Delete Browser Save</button>`:''}</div><p class="small">${VERSION} is focused on making the first 10–15 minutes smoother for public testers.</p></div></section></div>`;if(player)document.getElementById('continue').onclick=()=>{addLog('Welcome back to Ashmere.','story');menu()};document.getElementById('new').onclick=createName;if(player)document.getElementById('delete').onclick=()=>{[SAVE_KEY,...OLD].forEach(k=>localStorage.removeItem(k));player=null;log=[];title()}}
function createName(){root.innerHTML=`<div class="title-wrap"><section class="title-card"><div><div class="kicker">The Road Asks</div><h1 style="margin:0;color:var(--accent);font-size:clamp(2rem,7vw,5rem)">Who Are You?</h1><p class="title-lore">You wake beneath a dead lantern. Ahead, a sign points toward Ashmere. Your cracked token has a name on it.</p><input id="name" placeholder="Name, no spaces"><div class="actions"><button class="btn primary" id="next">Continue</button><button class="btn" id="back">Back</button></div></div></section></div>`;document.getElementById('next').onclick=()=>{let n=document.getElementById('name').value.trim();if(!n||n.includes(' '))return alert("Your name can't be empty or contain spaces.");chooseOrigin(n)};document.getElementById('back').onclick=title}
function choosePage(step,heading,lore,items,onPick,back){root.innerHTML=`<div class="title-wrap"><section class="title-card"><div><div class="kicker">${step}</div><h1 style="margin:0;color:var(--accent);font-size:clamp(2rem,7vw,5rem)">${heading}</h1><p class="title-lore">${lore}</p><div class="list">${items.map(([n,d])=>`<button class="shop" data-pick="${esc(n)}"><h3>${esc(n)}</h3><p>${esc(d.desc||d.text)}</p></button>`).join('')}</div><div class="actions"><button class="btn" id="back">Back</button></div></div></section></div>`;document.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>onPick(b.dataset.pick));document.getElementById('back').onclick=back}
function chooseOrigin(n){choosePage('Character Creation','Choose Your Origin','Who were you before the road took you?',Object.entries(origins),o=>chooseClass(n,o),createName)}
function chooseClass(n,o){choosePage('Character Creation','Choose Your Class','What did the road leave you capable of becoming?',Object.entries(classes),c=>chooseKeepsake(n,o,c),()=>chooseOrigin(n))}
function chooseKeepsake(n,o,c){choosePage('Character Creation','Choose Your Keepsake','One thing came with you from before the static.',Object.entries(keepsakes),k=>{player=newPlayer(n,o,c,k);log=[];addLog('The cracked token warms in your palm.','story');save();intro()},()=>chooseClass(n,o))}
function topbar(){return`<header class="topbar"><div class="brand"><h1>LEGEND</h1><div class="sub">Recovered Build ${VERSION}</div></div><div class="meta-grid"><div class="box"><span class="label">Location</span><span class="value">${locationName}</span></div><div class="box"><span class="label">Hero</span><span class="value">${esc(player.username)}</span></div></div><div class="meta-grid"><div class="box"><span class="label">HP</span><span class="value">${player.hp}/${player.maxHp}</span></div><div class="box"><span class="label">Gold</span><span class="value">${player.gold}</span></div></div></header>`}
function stats(){let hp=clamp(player.hp/player.maxHp*100,0,100),xp=player.level>=37?100:clamp(100-player.xpUntil/player.xpBase*100,0,100);return`<section class="panel"><div class="panel-head"><div><h3>Character</h3><p>${weapon().name} / ${armor().name}</p></div></div><div class="stat-grid"><div class="stat"><span class="label">Health</span><span class="num">${player.hp}/${player.maxHp}</span><div class="bar red"><span style="width:${hp}%"></span></div></div><div class="stat"><span class="label">Level</span><span class="num">${player.level}</span><div class="bar"><span style="width:${xp}%"></span></div></div><div class="stat"><span class="label">Road Tokens</span><span class="num gold">${player.inventory.roadToken}/3</span></div><div class="stat"><span class="label">Camp</span><span class="num">${player.inventory.camp}</span></div><div class="stat"><span class="label">Momentum</span><span class="num purple">${player.momentum}/5</span></div><div class="stat"><span class="label">Gold</span><span class="num gold">${player.gold}</span></div></div></section>`}
function quest(){let step='';if(!player.flags.bellQuestStarted)step='Bell Quest: Speak to Mara Vell in The Archive Hall.';else if(!player.flags.bellRoadSearched)step='Bell Quest: Explore Old Road once to find the Bell Shard.';else if(!player.flags.bellQuestComplete)step='Bell Quest: Bring the Bell Fragment to Brenn in The Ledger Hall.';else if(!player.flags.firstRoadComplete)step=`The First Road: Bring 3 Road Tokens to Brenn. Current: ${player.inventory.roadToken}/3.`;else step='Next: Prepare for The Hollow Keep.';return`<section class="panel"><div class="panel-head"><div><h3>Quest Tracker</h3><p>Current objective</p></div></div><div class="quest-step"><span class="tag">Main</span><span class="tag">${VERSION}</span><p class="text" style="font-size:.95rem;margin-top:8px">${step}</p></div></section>`}
function logs(){return`<section class="panel"><div class="panel-head"><div><h3>World Log</h3><p>Recent events</p></div></div><div class="log">${log.length?log.map(l=>`<div class="log-entry ${l.t}">${esc(l.m)}</div>`).join(''):`<div class="log-entry story">The world waits for input.</div>`}</div></section>`}
function layout(place,titleText,content,actions=[],extra=''){locationName=place;root.innerHTML=`<div class="shell">${topbar()}<div class="layout"><section class="panel"><div class="panel-head"><div><h2>${titleText}</h2><p>${place}</p></div><span class="value">${player.keepsake}</span></div>${extra||''}<div class="text">${content}</div><div class="actions">${actions.map((a,i)=>`<button class="btn ${a.className||''}" data-action="${i}">${a.label}</button>`).join('')}</div></section><aside class="stack">${stats()}${quest()}${logs()}</aside></div></div>`;actions.forEach((a,i)=>document.querySelector(`[data-action="${i}"]`).onclick=a.fn);window.scrollTo({top:0,behavior:'smooth'})}
function intro(){save();layout('Ashmere Road','The Road to Ashmere',`You wake beneath a dead lantern. Behind you, the path has collapsed into static. Ahead, the first town waits behind a tired wooden gate.\n\nThe sign reads: ASHMERE.\n\nThe town bell rings once. Then the world remembers you.`,[{label:'Enter Ashmere',className:'primary',fn:menu}],`<pre class="ascii">${ascii.ashmere}</pre>`)}
function menu(){save();let cards=[['🛤️','Explore The First Road','Balanced in v0.5.1: faster tokens, clearer events, better tester pacing.',exploreStart],['👥','People of Ashmere','Speak with NPCs and follow the questline.',people],['🛏️','Ashmere Inn','Rest, buy camp supplies, and prepare before leaving town.',inn],['⚖️','Trading Post','Sell monster drops and gathered resources for gold.',tradingPost],['🗡️','Weapon Shop','Buy stronger weapons with steady damage ranges.',weaponShop],['🛡️','Armor Shop','Buy armor before the roads punish you.',armorShop],['🌿','The Commons','Train skills and mastery.',commons],['🏛️','The Ledger Hall','Store gold and turn in quest items.',ledger],['📜','The Archive Hall','Read recovered memories and quests.',archive],['👤','Character Sheet','Review character, inventory, and quest log.',sheet],['🏰','The Hollow Keep','Face Lacoyx when you are ready.',keepWarn],['📝','Leave Feedback','Open the human playtest feedback page.',()=>location.href='feedback.html'],['💾','Save / Exit','Return to title.',title]];let html=`<pre class="ascii">${ascii.ashmere}</pre><div class="grid">${cards.map((c,i)=>`<button class="card" data-menu="${i}"><h3>${c[0]} ${c[1]}</h3><p>${c[2]}</p></button>`).join('')}</div>`;layout('Ashmere','Ashmere Menu','',[],html);cards.forEach((c,i)=>document.querySelector(`[data-menu="${i}"]`).onclick=c[3])}
const npcs={mara:{name:'Mara Vell',place:'The Archive Hall',role:'Archive Keeper',text:'The bell has not rung since the rollback. If you heard it, the world was calling you by name.',topics:[['Ask about the bell',()=>{player.flags.bellQuestStarted=true;questNote('The Bell That Rang Once: Explore Old Road to find the Bell Shard.');memory('Mara says the Ashmere bell has not worked since the rollback.');people()}],['Ask about The First Road',()=>{questNote('The First Road: Bring back 3 Road Tokens.');memory('Mara says Old Road now leaves clearer signs for new travelers.');people()}]]},brenn:{name:'Old Brenn',place:'The Ledger Hall',role:'Ledger Keeper',text:'Gold is easy to count. Names are harder. Yours was written here before you arrived.',topics:[['Show Bell Fragment',()=>{if(player.inventory.bellFragment>0){player.flags.bellQuestComplete=true;player.inventory.bellFragment--;gainGold(350);gainXP(160);memory('Brenn found your name in the ledger before the road brought you to Ashmere.');questNote('The Bell That Rang Once: Complete.')}else addLog('You do not have a Bell Fragment yet.','danger');people()}],['Turn in Road Tokens',()=>{if(player.inventory.roadToken>=3){player.inventory.roadToken-=3;player.flags.firstRoadComplete=true;player.stats.oldRoadClears++;gainGold(260);gainXP(200);gainItem('camp',2);memory('The First Road recognizes you now. The next routes feel less impossible.');questNote('The First Road: Complete.')}else addLog(`Brenn needs 3 Road Tokens as proof. You have ${player.inventory.roadToken}/3.`, 'danger');people()}]]},oric:{name:'Captain Oric',place:'Ashmere Gate',role:'Guard Captain',text:'If something watches you in a fight, watch it back. Intent saves lives.',topics:[['Combat lesson',()=>{memory('Oric taught you to guard before heavy strikes.');addTrait('Trained');people()}]]},sella:{name:'Sella of the Post',place:'Trading Post',role:'Trader',text:'Everything has a value. The trick is knowing when not to sell it.',topics:[['Ask about resources',()=>{addLog('Sella says: sell common drops, save quest items, camp supplies, food, tablets, and gems.','story');people()}]]}};
function people(){let html=`<pre class="ascii">${ascii.npc}</pre><div class="list">${Object.entries(npcs).map(([id,n])=>`<button class="npc-card" data-npc="${id}"><h3>${n.name}</h3><p>${n.role} - ${n.place}</p></button>`).join('')}</div>`;layout('Ashmere','People of Ashmere','The town has voices. Talk to people to unlock quests, rumors, and memories.',[{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-npc]').forEach(b=>b.onclick=()=>talk(b.dataset.npc))}
function talk(id){let n=npcs[id];let html=`<pre class="ascii">${ascii.npc}</pre><div class="quest"><h3>${n.name}</h3><p>${n.text}</p></div><div class="list">${n.topics.map((t,i)=>`<button class="shop" data-topic="${i}"><h3>${t[0]}</h3><p>Talk with ${n.name}.</p></button>`).join('')}</div>`;layout(n.place,n.name,n.role,[{label:'Back to People',fn:people},{label:'Back to Ashmere',fn:menu}],html);n.topics.forEach((t,i)=>document.querySelector(`[data-topic="${i}"]`).onclick=t[1])}
const routes=[{name:'Old Road',risk:1,unlock:()=>true,desc:'Beginner route. Best place to collect Road Tokens.'},{name:'Greenwild Edge',risk:2,unlock:()=>player.stats.checksPassed>=2||player.flags.firstRoadComplete,desc:'Better gathering, more beasts.'},{name:'Ruined Camps',risk:2,unlock:()=>player.stats.monstersDefeated>=2||player.flags.firstRoadComplete,desc:'Old fires and abandoned packs.'},{name:'Static Scar',risk:3,unlock:()=>player.flags.bellQuestStarted,desc:'A broken place where the Lost Build leaks through.'}];
const events=[['Road Token Cache','road','A cracked milestone hums with a tiny brass token.',[['Study the milestone','lore',8,()=>{roadSuccess();gainXP(35)},()=>addLog('The token sinks deeper into the road.','danger')],['Pry the token loose','strength',9,()=>roadSuccess(),()=>damage(4,12)],['Search around it','survival',7,()=>{roadSuccess();gainItem('food',1)},()=>gainItem('bait',1)]]],['Ruined Campsite','road','A half-buried chest sits beside cold ashes.',[['Open carefully','thieving',10,()=>{gainItem('gem',1);roadSuccess(false)},()=>damage(8,20)],['Search first','survival',9,()=>{gainItem('food',2);gainGold(35);roadSuccess(false)},()=>gainItem('fur',1)],['Force it open','strength',11,()=>{gainGold(120);gainItem('ore',2);roadSuccess(false)},()=>damage(12,30)]]],['Ironwood Tree','road','A stubborn ironwood tree leans over the path.',[['Chop carefully','survival',8,()=>{trainSkill('Woodcutting',2);roadSuccess(false)},()=>trainSkill('Woodcutting',1)],['Gather branches','survival',7,()=>{gainItem('log',2);trainSkill('Woodcutting',1);roadSuccess(false)},()=>gainItem('log',1)],['Make walking sticks','craft',9,()=>{gainItem('log',1);gainItem('camp',1);roadSuccess(false)},()=>gainItem('log',1)]]],['Dark Stream','road','A stream cuts across the road.',[['Cast near reeds','survival',8,()=>{gainItem('rfood',2);trainSkill('Fishing',2);roadSuccess(false)},()=>gainItem('bait',1)],['Cast deep','survival',11,()=>{gainItem('rfood',4);gainItem('gem',1);trainSkill('Fishing',3);roadSuccess(false)},()=>startBattle(true)],['Search the bank','luck',9,()=>{gainItem('bait',5);gainGold(25);roadSuccess(false)},()=>gainItem('bait',1)]]],['Bell Shard','bell','A cold metal shard hums beneath the road dust. The bell has followed you here.',[['Lift carefully','lore',9,()=>{player.inventory.bellFragment++;player.flags.bellRoadSearched=true;memory('The Bell Fragment rang without moving.');questNote('Bring the Bell Fragment to Brenn in The Ledger Hall.');roadSuccess(false)},()=>damage(5,16)],['Listen','magic',10,()=>{player.inventory.bellFragment++;player.flags.bellRoadSearched=true;memory('The bell rang before you woke.');roadSuccess(false)},()=>memory('The shard whispers, but you cannot understand it yet.')],['Leave it','survival',6,()=>addTrait('Cautious'),()=>null]]],['Roadside Ambush','road','Something moves behind the stones.',[['Stand and fight','strength',8,()=>startBattle(true),()=>startBattle(true)],['Sneak around','agility',11,()=>{gainGold(60);roadSuccess(false);addTrait('Cautious')},()=>startBattle(true)],['Call out','lore',11,()=>{memory('Not every monster chooses to be part of the encounter table.');gainItem('gmail',1);roadSuccess(false)},()=>startBattle(true)]]]];
function exploreStart(){explore={danger:0,route:null};let rs=routes.filter(r=>r.unlock());let html=`<pre class="ascii">${ascii.road}</pre><div class="list">${rs.map((r,i)=>`<button class="event-card" data-route="${i}"><h3>${r.name}</h3><p>${r.desc}</p><p class="small">Starting risk: ${r.risk}</p></button>`).join('')}</div>`;layout('Ashmere Gate','Choose a Route','v0.5.1 makes Old Road progress less random and better suited for first-time playtesters.',[{label:'Return to Ashmere',fn:menu}],html);document.querySelectorAll('[data-route]').forEach(b=>b.onclick=()=>{explore.route=rs[+b.dataset.route];explore.danger=explore.route.risk;exploreEvent()})}
function dangerPips(){let p='';for(let i=1;i<=6;i++)p+=`<span class="pip ${i<=explore.danger?(explore.danger>=5?'bad':'on'):''}"></span>`;return`<div class="danger-meter">${p}</div>`}
function pickEvent(){if(explore.route.name==='Old Road'&&player.flags.bellQuestStarted&&!player.flags.bellRoadSearched&&player.stats.oldRoadSuccesses>=1)return events.find(e=>e[0]==='Bell Shard');let pool=events.filter(e=>e[0]!=='Bell Shard'||player.flags.bellQuestStarted&&!player.flags.bellRoadSearched);if(explore.route.name==='Old Road')pool=pool.filter(e=>['Road Token Cache','Ruined Campsite','Ironwood Tree','Dark Stream','Bell Shard','Roadside Ambush'].includes(e[0]));return pool[rand(0,pool.length-1)]}
function exploreEvent(){if(explore.danger>=6)return forcedEvent();lastEvent=pickEvent();let html=`<pre class="ascii">${ascii[lastEvent[1]]||ascii.road}</pre><div class="event-card" style="cursor:default"><h3>${lastEvent[0]}</h3><p>${lastEvent[2]}</p><p class="small">Route: ${explore.route.name} / Road Tokens: ${player.inventory.roadToken}/3</p>${dangerPips()}</div><div class="list">${lastEvent[3].map((c,i)=>`<button class="shop" data-choice="${i}"><h3>${c[0]}</h3><p>Roll: ${c[1]} check</p></button>`).join('')}</div>`;layout('Roads Beyond Ashmere','Exploration Event','',explore.danger>=3?[{label:'Make Camp',fn:camp},{label:'Return to Ashmere',fn:returnTown}]:[{label:'Return to Ashmere',fn:returnTown}],html);document.querySelectorAll('[data-choice]').forEach(b=>b.onclick=()=>resolveChoice(+b.dataset.choice))}
function resolveChoice(i){let [label,skill,dc,success,fail]=lastEvent[3][i];addLog('Choice: '+label+'.');let r=d20(skill,dc+Math.max(0,explore.danger-2));r.ok?success():fail();explore.danger+=rand(explore.route.name==='Old Road'?0:1,2);save();afterEvent()}
function roadSuccess(alwaysToken=true){if(explore?.route?.name==='Old Road'){player.stats.oldRoadSuccesses++;if(alwaysToken||player.stats.oldRoadSuccesses%2===0){gainItem('roadToken',1);addLog('Old Road progress reward: Road Token secured.','story')}else addLog('Old Road progress recorded. One more success will reveal a Road Token.','story')}else if(rand(1,3)===1)gainItem('roadToken',1)}
function afterEvent(){layout('Roads Beyond Ashmere','The Road Continues',`Danger Level: ${explore.danger}/6\nRoad Tokens: ${player.inventory.roadToken}/3\nOld Road Successes: ${player.stats.oldRoadSuccesses}\nCamp Supplies: ${player.inventory.camp}\n\nv0.5.1 note: every 2 Old Road successes now guarantees a Road Token, and some events give one directly.`,[{label:'Continue Exploring',className:'primary',fn:exploreEvent},{label:'Make Camp',fn:camp},{label:'Return to Ashmere',fn:returnTown}],`<pre class="ascii">${ascii.road}</pre>${dangerPips()}`)}
function camp(){if(player.inventory.camp>0){player.inventory.camp--;heal(35,70);explore.danger=Math.max(1,explore.danger-2);addLog('You use Camp Supplies. Danger falls.','story');save();return afterEvent()}let r=d20('survival',9+Math.max(0,explore.danger-2));if(r.ok){heal(15,40);explore.danger=Math.max(1,explore.danger-1);addLog('Rough camp made safely.','story')}else{addLog('The campfire draws attention.','danger');explore.danger++;if(rand(1,2)===1)return startBattle(true)}save();afterEvent()}
function forcedEvent(){addLog('The road becomes too dangerous to ignore.','danger');startBattle(true)}
function returnTown(){player.hp=clamp(player.hp,1,player.maxHp);addLog('You return to Ashmere with what you found.','story');explore=null;save();menu()}
function startBattle(fromExplore=false){let t=enemies[rand(0,enemies.length-1)];if(explore?.route?.name==='Old Road')t=[enemies[0],enemies[1],enemies[2]][rand(0,2)];let scale=Math.max(0,player.level-1)+(explore?explore.danger*6:0);enemy={...t,level:rand(Math.max(1,player.level-1),player.level+Math.max(1,Math.ceil((explore?.danger||1)/2))),hp:rand(t.hp[0]+scale,t.hp[1]+scale),maxHp:0,fromExplore,intent:t.intent[rand(0,t.intent.length-1)]};enemy.maxHp=enemy.hp;guarded=false;addLog(`You encounter a level ${enemy.level} ${enemy.name}. Trait: ${enemy.trait}.`);battle()}
function battle(){let ep=clamp(enemy.hp/enemy.maxHp*100,0,100),hp=clamp(player.hp/player.maxHp*100,0,100),w=weapon();let html=`<div class="enemy"><div><div class="glyph">${enemy.glyph}</div><h2 class="red">${enemy.name}</h2><div class="muted">Level ${enemy.level} / Trait: ${enemy.trait}</div><div class="bar red" style="width:min(360px,72vw);margin:14px auto 0"><span style="width:${ep}%"></span></div><p class="small">${enemy.hp}/${enemy.maxHp} HP</p><p class="small gold">Intent: ${enemy.intent}</p></div></div><div class="stat-grid" style="margin-top:14px"><div class="stat"><span class="label">Your Health</span><span class="num">${player.hp}/${player.maxHp}</span><div class="bar red"><span style="width:${hp}%"></span></div></div><div class="stat"><span class="label">Weapon</span><span class="num gold">${w.name}</span><p class="small">Damage ${w.min}-${w.max}</p></div><div class="stat"><span class="label">Momentum</span><span class="num purple">${player.momentum}/5</span><div class="bar gold"><span style="width:${player.momentum*20}%"></span></div></div><div class="stat"><span class="label">Armor</span><span class="num">${armor().name}</span></div></div>`;layout(enemy.name==='Lacoyx'?'The Hollow Keep':'Road Encounter','Battle','',[{label:'Attack',className:'primary',fn:attack},{label:'Guard',fn:guard},{label:`${classes[player.className].move} ${player.momentum>=2?'':'(2 Momentum)'}`,fn:classMove},{label:'Eat Food',fn:()=>useHeal('food',45)},...(enemy.name==='Lacoyx'?[]:[{label:'Flee',fn:()=>{addLog('You flee back toward Ashmere.');enemy.fromExplore?returnTown():menu()}}])],html)}
function attack(){let w=weapon(),dmg=rand(w.min,w.max);if(enemy.trait==='Stonehide'&&dmg<35){dmg=Math.floor(dmg*.55);addLog('Stonehide reduces the weak hit.','danger')}enemy.hp-=Math.min(enemy.hp,dmg);player.momentum=clamp(player.momentum+1,0,5);gainXP(Math.floor(dmg*.85));addLog(`You deal ${dmg} damage.`);if(enemy.hp<=0)return win();enemyAttack()}
function guard(){guarded=true;player.momentum=clamp(player.momentum+1,0,5);addLog('You guard and read the enemy intent. Momentum +1.','story');enemyAttack()}
function classMove(){if(player.momentum<2){addLog('Not enough Momentum.','danger');return battle()}player.momentum-=2;let w=weapon(),dmg=Math.floor(rand(w.min,w.max)*1.45);if(player.className==='Ranger')enemy.maxDamage=Math.max(8,enemy.maxDamage-12);if(player.className==='Thief')gainGold(rand(15,65));if(player.className==='Skiller')heal(10,30);enemy.hp-=Math.min(enemy.hp,dmg);gainXP(Math.floor(dmg*.9));addLog(`${classes[player.className].move} hits for ${dmg}.`,'story');if(enemy.hp<=0)return win();enemyAttack()}
function enemyAttack(){let dmg=Math.max(0,rand(1,enemy.maxDamage)-rand(0,armor().defense));if(enemy.trait==='Heavy'&&enemy.intent.includes('heavy'))dmg+=guarded?0:8;if(enemy.trait==='Drain'&&rand(1,3)===1){player.momentum=Math.max(0,player.momentum-1);addLog('The Mage drains 1 Momentum.','danger')}if(enemy.trait==='Sneaky'&&rand(1,4)===1){let stolen=Math.min(player.gold,rand(5,20));player.gold-=stolen;addLog(`The Goblin steals ${stolen} gold.`, 'danger')}if(guarded){dmg=Math.floor(Math.max(0,dmg)*.45);guarded=false}player.hp-=Math.max(0,dmg);addLog(`${enemy.name} attacks and deals ${Math.max(0,dmg)} damage.`);let base=enemies.find(e=>e.name===enemy.name);enemy.intent=base?base.intent[rand(0,base.intent.length-1)]:'watches you';if(player.hp<=0)return die();save();battle()}
function win(){let[k,a,n]=enemy.drop;gainItem(k,a,false);player.stats.monstersDefeated++;player.momentum=clamp(player.momentum+1,0,5);if(enemy.trait==='Skittish')gainItem('bait',1,false);if(enemy.fromExplore&&explore?.route?.name==='Old Road')roadSuccess(false);addLog(`You defeated ${enemy.name} and received ${a} ${n}.`,'story');if(enemy.name==='Lacoyx'){player.inventory.codeFragment++;memory('Lacoyx guarded a Code Fragment from the Lost Build.')}player.hp=clamp(player.hp+Math.floor(player.maxHp*.25),1,player.maxHp);save();enemy.fromExplore?afterEvent():menu()}
function die(){player.stats.timesDied++;player.hp=player.maxHp;player.momentum=0;explore=null;addLog('You died. Ashmere drags your save back from the dark.','danger');save();menu()}
function useHeal(k,max){if(player.inventory[k]<=0){addLog(`No ${itemNames[k]} left.`,'danger');return battle()}player.inventory[k]--;heal(12,max);enemyAttack()}
function trainSkill(name,mult=1){let s=player.skills[name],amount=s.gain*mult;s.xp+=amount;s.xpLeft-=amount;player.mastery[name]=clamp((player.mastery[name]||0)+mult,0,100);addLog(`${name} gains ${amount} XP and ${mult}% mastery.`);if(s.xpLeft<=0){let check=d20(s.check,8+s.level);if(check.ok){s.level++;s.xpLeft=80+s.level*32;addLog(`${name} leveled up to ${s.level}.`,'story')}else{s.xpLeft=25;addLog(`${name} is close to leveling. Try again.`,'danger')}}}
function commons(){let html=`<div class="list">${Object.entries(player.skills).map(([n,s])=>`<button class="shop" data-skill="${n}"><h3>${n} - Level ${s.level}</h3><p>XP: ${s.xp} / Left: ${s.xpLeft}. Mastery: ${player.mastery[n]||0}%.</p></button>`).join('')}</div>`;layout('The Commons','Skill Training','Skills are still early, but mastery now feeds route rewards and future progression.',[{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-skill]').forEach(b=>b.onclick=()=>{let n=b.dataset.skill;trainSkill(n,2);save();commons()})}
function inn(){layout('Ashmere Inn','Ashmere Inn',`The inn smells like rain, old wood, and soup.\n\nRest: 35 gold, restores HP.\nBuy Camp Supplies: 90 gold each.\nBuy Road Meal: 55 gold, gives 1 Food.`,[{label:'Rest - 35g',className:'primary',fn:()=>{if(player.gold>=35){player.gold-=35;player.hp=player.maxHp;addLog('You rest at the Ashmere Inn. HP restored.','story');save()}else addLog('Not enough gold.','danger');inn()}},{label:'Buy Camp Supplies - 90g',fn:()=>{if(player.gold>=90){player.gold-=90;gainItem('camp',1);save()}else addLog('Not enough gold.','danger');inn()}},{label:'Buy Road Meal - 55g',fn:()=>{if(player.gold>=55){player.gold-=55;gainItem('food',1);save()}else addLog('Not enough gold.','danger');inn()}},{label:'Back to Ashmere',fn:menu}],`<pre class="ascii">${ascii.ashmere}</pre>`)}
function sheet(){let inv=Object.entries(player.inventory).map(([k,v])=>`- ${itemNames[k]||k}: ${v}`).join('\n');let mastery=Object.keys(player.skills).map(k=>`- ${k}: ${player.mastery[k]||0}%`).join('\n');layout('Character Sheet','Character Sheet',`Name: ${player.username}\nOrigin: ${player.origin}\nClass: ${player.className}\nKeepsake: ${player.keepsake}\nTraits: ${player.traits.join(', ')||'None yet'}\n\nInventory:\n${inv}\n\nMastery:\n${mastery}\n\nQuest Log:\n- ${(player.questLog.length?player.questLog:['No quests recorded yet.']).join('\n- ')}\n\nMemories:\n- ${player.memories.join('\n- ')}`,[{label:'Back to Ashmere',fn:menu}],`<pre class="ascii">${ascii.ashmere}</pre>`)}
function shop(title,items,type){let html=`<div class="list">${items.map(x=>`<button class="shop" data-buy="${x.id}"><h3>${x.name}</h3><p>${type==='weapon'?`Damage ${x.min}-${x.max}`:`Block 0-${x.defense}`} / Cost ${x.cost} gold / Level ${x.level}</p></button>`).join('')}</div>`;layout(title,title,'', [{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-buy]').forEach(b=>b.onclick=()=>buy(items.find(x=>x.id===b.dataset.buy),type))}
function weaponShop(){shop('Weapon Shop',weapons.filter(w=>w.id!=='hand'),'weapon')}function armorShop(){shop('Armor Shop',armors.filter(a=>a.id!=='none'),'armor')}
function buy(item,type){if(player.level<item.level){addLog(`Need level ${item.level}.`,'danger');return menu()}if(player.gold<item.cost){addLog('Not enough gold.','danger');return menu()}player.gold-=item.cost;if(type==='weapon'){player.ownedWeapons[item.id]=(player.ownedWeapons[item.id]||0)+1;player.weapon=item.id}else{player.ownedArmor[item.id]=(player.ownedArmor[item.id]||0)+1;player.armor=item.id}addLog(`Bought and equipped ${item.name}.`,'story');save();menu()}
function tradingPost(){let sellables=Object.keys(prices).filter(k=>prices[k]>0&&player.inventory[k]>0&&!['camp','food','potion','rtab','gem'].includes(k));let html=`<pre class="ascii">${ascii.ashmere}</pre><div class="list">${sellables.length?sellables.map(k=>`<button class="shop" data-sell="${k}"><h3>${itemNames[k]} x${player.inventory[k]}</h3><p>Value: ${sellPrice(k)} gold each. Sell all for ${sellPrice(k)*player.inventory[k]} gold.</p></button>`).join(''):'<div class="quest"><h3>Nothing safe to sell</h3><p>Explore beyond Ashmere to recover common drops and resources.</p></div>'}</div>`;layout('Trading Post','Trading Post','Sell common drops. Quest and survival items are protected from quick selling.',[{label:'Back to Ashmere',fn:menu}],html);document.querySelectorAll('[data-sell]').forEach(b=>b.onclick=()=>sellItem(b.dataset.sell))}
function sellPrice(k){return Math.floor(prices[k]*(1+(keepsakes[player.keepsake]?.sellBonus||0)))}
function sellItem(k){let q=player.inventory[k];if(q<=0)return tradingPost();let total=sellPrice(k)*q;player.inventory[k]=0;player.gold+=total;addLog(`Sold ${q} ${itemNames[k]} for ${total} gold.`,'story');save();tradingPost()}
function ledger(){let html=`<pre class="ascii">       ___________________\n      |  THE LEDGER HALL |\n      |  GOLD  RECORDS  |\n      |_____|_____|_____|</pre><div class="list">${player.bank.map((g,i)=>`<div class="quest"><h3>Ledger Account ${i+1}</h3><p>Stored gold: <span class="gold">${g}</span></p><div class="actions"><button class="btn" data-dep="${i}">Deposit All</button><button class="btn" data-wit="${i}">Withdraw All</button></div></div>`).join('')}</div>`;layout('The Ledger Hall','The Ledger Hall','A vault of gold, records, and old save logic.',[{label:'Speak with Brenn',fn:()=>talk('brenn')},{label:'Back',fn:menu}],html);document.querySelectorAll('[data-dep]').forEach(b=>b.onclick=()=>{let i=+b.dataset.dep,amt=player.gold;player.bank[i]+=amt;player.gold=0;addLog(`Deposited ${amt} gold.`);save();ledger()});document.querySelectorAll('[data-wit]').forEach(b=>b.onclick=()=>{let i=+b.dataset.wit,amt=player.bank[i];player.gold+=amt;player.bank[i]=0;addLog(`Withdrew ${amt} gold.`);save();ledger()})}
function archive(){let html=`<div class="list"><div class="quest"><h3>The Bell That Rang Once</h3><p>${player.flags.bellQuestComplete?'Complete':'Active'} - Follow the bell from road to ledger.</p></div><div class="quest"><h3>The First Road</h3><p>${player.flags.firstRoadComplete?'Complete':'Active'} - Bring 3 Road Tokens to Brenn.</p></div><div class="quest"><h3>Recovered Memories</h3><p>${player.memories.length} memories recovered.</p></div></div>`;layout('The Archive Hall','The Archive Hall','The Archive Hall remembers quests from a world that rolled back.',[{label:'Speak with Mara',fn:()=>talk('mara')},{label:'Read Memories',fn:()=>layout('Archive Hall','Recovered Memories',player.memories.map(m=>'- '+m).join('\n'),[{label:'Back',fn:archive},{label:'Ashmere',fn:menu}])},{label:'Back',fn:menu}],html)}
function keepWarn(){let ok=player.level>=5;layout('The Hollow Keep','The Hollow Keep',`${ok?'The gate recognizes your recovered level.':'The gate is sealed. Reach level 5 first.'}\n\nLacoyx waits below. You cannot flee from him.`,[...(ok?[{label:'Enter The Hollow Keep',className:'primary',fn:boss}]:[]),{label:'Back',fn:menu}],`<pre class="ascii">${ascii.keep}</pre>`)}
function boss(){enemy={name:'Lacoyx',glyph:'♛',level:741,hp:2780,maxHp:2780,maxDamage:520,drop:['morb',25,'Magic Orbs'],fromExplore:false,intent:'remembers your previous build',trait:'Boss'};addLog('Lacoyx: You made the first road matter. Good.','danger');battle()}
title();
</script></body></html>
